    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    // Allow-list URL schemes to guard against javascript: / data: payloads
    function safeUrl(raw) {
      const trimmed = String(raw || '').trim();
      if (/^(https?:|mailto:|tel:|#|\/)/i.test(trimmed)) return trimmed;
      return '#';
    }

    // Minimal but proper markdown→HTML. Input is always escaped first, so
    // regex replacements only wrap the escaped text in tags — no XSS surface.
    function renderMarkdown(text) {
      if (text == null) return '';
      // 1) Extract fenced code blocks first so their contents aren't touched by
      //    later inline transforms (which would mangle asterisks, hashes, etc.)
      const fences = [];
      text = String(text).replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const idx = fences.length;
        fences.push(`<pre><code>${escapeHtml(code.replace(/\n$/, ''))}</code></pre>`);
        return `RHFENCE${idx}ENDFENCE`;
      });

      // 2) Escape the rest, then apply block- and inline-level transforms
      let html = escapeHtml(text);

      // Headers (#, ##, ###)
      html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^##\s+(.+)$/gm,  '<h2>$1</h2>');
      html = html.replace(/^#\s+(.+)$/gm,   '<h1>$1</h1>');

      // Blockquotes — consecutive lines starting with "> ".
      // (Runs after escapeHtml, so `>` shows up as `&gt;`.)
      html = html.replace(/(^|\n)((?:&gt;\s?.+(?:\n|$))+)/g, (match, pre, block) => {
        const inner = block.replace(/^&gt;\s?/gm, '').replace(/\n+$/, '');
        return `${pre}<blockquote>${inner.replace(/\n/g, '<br>')}</blockquote>`;
      });

      // Unordered lists
      html = html.replace(/(^|\n)((?:[-*]\s+.+(?:\n|$))+)/g, (match, pre, block) => {
        const items = block.trim().split('\n')
          .map(l => `<li>${l.replace(/^[-*]\s+/, '')}</li>`).join('');
        return `${pre}<ul>${items}</ul>`;
      });

      // Ordered lists
      html = html.replace(/(^|\n)((?:\d+\.\s+.+(?:\n|$))+)/g, (match, pre, block) => {
        const items = block.trim().split('\n')
          .map(l => `<li>${l.replace(/^\d+\.\s+/, '')}</li>`).join('');
        return `${pre}<ol>${items}</ol>`;
      });

      // Inline: code, bold, italic, links
      html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g, '$1<em>$2</em>');
      html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, label, href) =>
        `<a href="${safeUrl(href)}" target="_blank" rel="noopener noreferrer">${label}</a>`
      );

      // Paragraph breaks (double newlines) and soft breaks.
      // But don't wrap block-level elements inside <p>.
      const blocks = html.split(/\n\n+/).map(chunk => {
        const trimmed = chunk.trim();
        if (!trimmed) return '';
        if (/^(<(h[1-6]|ul|ol|blockquote|pre)|RHFENCE)/.test(trimmed)) return trimmed;
        return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
      });
      html = blocks.join('');

      // 3) Re-hydrate fenced code blocks
      html = html.replace(/RHFENCE(\d+)ENDFENCE/g, (_, i) => fences[Number(i)] || '');
      return html;
    }

    // ── Task Tracker ──
    let cachedTasks = [];

    async function fetchTasks() {
      try { const res = await fetch('/api/tasks'); cachedTasks = await res.json(); } catch { cachedTasks = []; }
      return cachedTasks;
    }

    function isOverdue(task) {
      const status = task.status || '';
      if (status.toLowerCase() === 'done' || !task.due_date) return false;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return new Date(task.due_date + 'T00:00:00') < today;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderSummary() {
      const total = cachedTasks.length;
      const done = cachedTasks.filter(t => (t.status || '').toLowerCase() === 'done').length;
      const overdue = cachedTasks.filter(t => isOverdue(t)).length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      document.getElementById('summary-bar').innerHTML = `
        <div class="summary-item">Total: ${total}</div>
        <div class="summary-item">Done: ${done}</div>
        ${overdue > 0 ? `<div class="summary-item overdue">Overdue: ${overdue}</div>` : ''}
      `;

      const fill = document.getElementById('tasks-progress-fill');
      const bar  = document.getElementById('tasks-progress-bar');
      const text = document.getElementById('tasks-progress-text');
      const pctEl = document.getElementById('tasks-progress-pct');
      if (fill) fill.style.width = pct + '%';
      if (bar) bar.setAttribute('aria-valuenow', String(pct));
      if (text) text.textContent = `${done} / ${total}`;
      if (pctEl) pctEl.textContent = `${pct}%`;
    }

    function assigneeAvatar(nameField) {
      const raw = String(nameField || '').trim();
      if (!raw) return `<span class="avatar avatar-unassigned" aria-hidden="true">?</span>`;
      const names = raw.split(',').map(s => s.trim()).filter(Boolean);
      if (names.length > 1) {
        return `<span class="avatar avatar-multi" aria-hidden="true">${names.length}</span>`;
      }
      const initial = names[0].charAt(0).toUpperCase() || '?';
      return `<span class="avatar" aria-hidden="true">${escapeHtml(initial)}</span>`;
    }

    function renderTaskCards() {
      const container = document.getElementById('task-cards');
      if (cachedTasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 18c0-4.4 3.6-8 8-8s8 3.6 8 8"></path>
              <path d="M4 18v3"></path><path d="M20 18v3"></path>
              <path d="M8 14c0-2.2 1.8-4 4-4s4 1.8 4 4"></path>
              <circle cx="12" cy="5" r="1.3"></circle>
            </svg>
            <div class="empty-state-title">All clear, partner</div>
            <div class="empty-state-body">No tasks on the board. Rope one in with the <b>+ Add Task</b> button.</div>
          </div>`;
        return;
      }
      const statusMap = { 'pending': 0, 'in-progress': 1, 'done': 2 };
      const sorted = [...cachedTasks].sort((a, b) => (statusMap[a.status] || 0) - (statusMap[b.status] || 0));
      container.innerHTML = sorted.map(t => {
        const overdue = isOverdue(t);
        const s = (t.status || 'pending').toLowerCase();
        const badgeClass = s === 'in-progress' ? 'in-progress' : s === 'done' ? 'done' : 'pending';
        const displayStatus = s === 'in-progress' ? 'In Progress' : s === 'done' ? 'Done' : 'Pending';
        const safeTitle = escapeHtml(t.title);
        const assigneeName = (t.assigned_to || '').trim() || 'Unassigned';
        return `<article class="task-card status-${badgeClass}${overdue ? ' overdue' : ''}" aria-label="${safeTitle}, ${displayStatus}${overdue ? ', overdue' : ''}" tabindex="0">
          <div class="task-card-header">
            <div class="task-title">${safeTitle}</div>
            <div class="task-card-actions">
              <button type="button" onclick="editTask(${t.id})" aria-label="Edit task: ${safeTitle}" title="Edit">&#9998;</button>
              <button type="button" onclick="deleteTask(${t.id})" aria-label="Delete task: ${safeTitle}" title="Delete">&#10005;</button>
            </div>
          </div>
          <div class="task-meta">
            <span class="task-assignee">${assigneeAvatar(t.assigned_to)}<span>${escapeHtml(assigneeName)}</span></span>
            <span>${t.due_date ? formatDate(t.due_date) : 'No due date'}</span>
            <span class="status-badge ${badgeClass}">${displayStatus}</span>
            ${overdue ? '<span class="overdue-badge" aria-hidden="true">OVERDUE</span>' : ''}
          </div>
        </article>`;
      }).join('');
    }

    async function renderTasks() { await fetchTasks(); renderSummary(); renderTaskCards(); if (typeof renderHome === 'function') renderHome(); }

    // ── Home Dashboard ──
    function greetingFor(hour) {
      if (hour < 5)  return 'Up late';
      if (hour < 12) return 'Morning';
      if (hour < 17) return 'Afternoon';
      if (hour < 21) return 'Evening';
      return 'Evening';
    }

    function dueThisWeek(task) {
      const status = (task.status || '').toLowerCase();
      if (status === 'done' || !task.due_date) return false;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const end = new Date(today); end.setDate(end.getDate() + 7);
      const due = new Date(task.due_date + 'T00:00:00');
      return due >= today && due <= end;
    }

    function goToTasksTab() {
      const btn = document.getElementById('tasks-tab-btn');
      if (btn) activateTab(btn);
    }

    function renderHome() {
      if (!currentUser) return;
      const firstName = (currentUser.name || '').split(' ')[0] || 'partner';
      const now = new Date();
      const greetEl = document.getElementById('home-greeting');
      const dateEl = document.getElementById('home-date');
      if (greetEl) {
        greetEl.innerHTML = `${greetingFor(now.getHours())}, <span class="accent">${escapeHtml(firstName)}</span>.`;
      }
      if (dateEl) {
        dateEl.textContent = now.toLocaleDateString('en-US', {
          weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
        });
      }

      const mine = cachedTasks.filter(t => {
        const a = String(t.assigned_to || '').toLowerCase();
        return !currentUser.name || a.split(',').map(s => s.trim()).includes(currentUser.name.toLowerCase());
      });
      // Fall back to org-wide counts if the user has zero tasks — better than three zeroes.
      const scope = mine.length > 0 ? mine : cachedTasks;
      const scopeLabel = mine.length > 0 ? 'yours' : 'org-wide';
      const overdueCount = scope.filter(isOverdue).length;
      const weekCount = scope.filter(dueThisWeek).length;
      const doneCount = scope.filter(t => (t.status || '').toLowerCase() === 'done').length;

      const stats = document.getElementById('home-stats');
      if (stats) {
        stats.innerHTML = `
          <button type="button" class="stat-card overdue" data-filter="overdue" aria-label="${overdueCount} overdue tasks">
            <div class="stat-card-label">Overdue</div>
            <div>
              <div class="stat-card-value">${overdueCount}</div>
              <div class="stat-card-foot">${scopeLabel}</div>
            </div>
          </button>
          <button type="button" class="stat-card week" data-filter="week" aria-label="${weekCount} tasks due this week">
            <div class="stat-card-label">Due this week</div>
            <div>
              <div class="stat-card-value">${weekCount}</div>
              <div class="stat-card-foot">${scopeLabel}</div>
            </div>
          </button>
          <button type="button" class="stat-card done" data-filter="done" aria-label="${doneCount} tasks completed">
            <div class="stat-card-label">Completed</div>
            <div>
              <div class="stat-card-value">${doneCount}</div>
              <div class="stat-card-foot">${scopeLabel}</div>
            </div>
          </button>
        `;
        stats.querySelectorAll('.stat-card').forEach(el => {
          el.addEventListener('click', goToTasksTab);
        });
      }

      // Recent activity — top 5 tasks sorted by most recent "touch" (created)
      const activityEl = document.getElementById('home-activity');
      const countEl = document.getElementById('home-activity-count');
      if (!activityEl) return;
      if (cachedTasks.length === 0) {
        activityEl.innerHTML = `
          <div class="empty-state" style="padding:24px 12px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 7v5l3 2"></path>
            </svg>
            <div class="empty-state-title">Nothing on the feed yet</div>
            <div class="empty-state-body">Tasks created across the org will show up here.</div>
          </div>`;
        if (countEl) countEl.textContent = '';
        return;
      }
      const recent = [...cachedTasks]
        .sort((a, b) => {
          const ad = a.created_at || '';
          const bd = b.created_at || '';
          if (ad && bd) return bd.localeCompare(ad);
          return (b.id || 0) - (a.id || 0);
        })
        .slice(0, 5);
      if (countEl) countEl.textContent = recent.length + ' recent';

      activityEl.innerHTML = recent.map(t => {
        const s = (t.status || 'pending').toLowerCase();
        const done = s === 'done';
        const pill = done
          ? '<span class="activity-pill done">Completed</span>'
          : '<span class="activity-pill created">Created</span>';
        const when = t.created_at
          ? relativeTime(t.created_at)
          : (t.due_date ? ('Due ' + formatDate(t.due_date)) : '');
        const who = escapeHtml((t.assigned_to || 'Unassigned').split(',')[0].trim() || 'Unassigned');
        return `<button type="button" class="activity-item" data-task-id="${t.id}" aria-label="${escapeHtml(t.title)}, ${done ? 'completed' : 'created'}">
          ${pill}
          <div class="activity-body">
            <div class="activity-title">${escapeHtml(t.title)}</div>
            <div class="activity-meta">${who}${when ? ' · ' + escapeHtml(when) : ''}</div>
          </div>
        </button>`;
      }).join('');
      activityEl.querySelectorAll('.activity-item').forEach(el => {
        el.addEventListener('click', goToTasksTab);
      });
    }

    function relativeTime(isoish) {
      try {
        const then = new Date(isoish.includes('T') ? isoish : isoish.replace(' ', 'T') + 'Z');
        const ms = Date.now() - then.getTime();
        if (isNaN(ms)) return '';
        const min = Math.floor(ms / 60000);
        if (min < 1) return 'just now';
        if (min < 60) return `${min}m ago`;
        const hr = Math.floor(min / 60);
        if (hr < 24) return `${hr}h ago`;
        const d = Math.floor(hr / 24);
        if (d < 7) return `${d}d ago`;
        return then.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      } catch { return ''; }
    }

    // Form
    const addTaskBtn = document.getElementById('add-task-btn');
    const taskForm = document.getElementById('task-form');
    const tfTitle = document.getElementById('tf-title');
    const tfDue = document.getElementById('tf-due');
    const tfStatus = document.getElementById('tf-status');
    const tfEditId = document.getElementById('tf-edit-id');

    // ── Multi-select assignee picker ──
    const assigneeWrap = document.getElementById('tf-assignee-wrap');
    const assigneeTrigger = document.getElementById('tf-assignee-trigger');
    const assigneePanel = document.getElementById('tf-assignee-panel');
    const assigneeLabel = document.getElementById('tf-assignee-label');
    const allMembersCheckbox = document.getElementById('tf-all-members');
    const memberCheckboxes = Array.from(assigneePanel.querySelectorAll('input[type="checkbox"]:not(#tf-all-members)'));
    const TOTAL_MEMBERS = memberCheckboxes.length;

    function getSelectedMembers() {
      return memberCheckboxes.filter(c => c.checked).map(c => c.value);
    }
    function setSelectedMembers(names) {
      const arr = Array.isArray(names)
        ? names
        : String(names || '').split(',').map(s => s.trim()).filter(Boolean);
      const expand = arr.some(n => n.toLowerCase() === 'all members');
      memberCheckboxes.forEach(c => { c.checked = expand || arr.includes(c.value); });
      syncAllMembersCheckbox();
      updateAssigneeLabel();
    }
    function syncAllMembersCheckbox() {
      const selected = getSelectedMembers().length;
      allMembersCheckbox.checked = selected === TOTAL_MEMBERS;
      allMembersCheckbox.indeterminate = selected > 0 && selected < TOTAL_MEMBERS;
    }
    function updateAssigneeLabel() {
      const selected = getSelectedMembers();
      assigneeLabel.classList.toggle('placeholder', selected.length === 0);
      if (selected.length === 0) assigneeLabel.textContent = 'Select member(s)';
      else if (selected.length === TOTAL_MEMBERS) assigneeLabel.textContent = 'All Members';
      else if (selected.length <= 3) assigneeLabel.textContent = selected.join(', ');
      else assigneeLabel.textContent = `${selected.length} members selected`;
    }
    function openAssigneePanel() {
      assigneePanel.classList.add('open');
      assigneeTrigger.setAttribute('aria-expanded', 'true');
    }
    function closeAssigneePanel() {
      assigneePanel.classList.remove('open');
      assigneeTrigger.setAttribute('aria-expanded', 'false');
    }
    assigneeTrigger.addEventListener('click', () => {
      if (assigneePanel.classList.contains('open')) closeAssigneePanel();
      else openAssigneePanel();
    });
    allMembersCheckbox.addEventListener('change', () => {
      const check = allMembersCheckbox.checked;
      memberCheckboxes.forEach(c => { c.checked = check; });
      allMembersCheckbox.indeterminate = false;
      updateAssigneeLabel();
    });
    memberCheckboxes.forEach(c => c.addEventListener('change', () => {
      syncAllMembersCheckbox();
      updateAssigneeLabel();
    }));
    document.addEventListener('click', (e) => {
      if (!assigneeWrap.contains(e.target)) closeAssigneePanel();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && assigneePanel.classList.contains('open')) {
        closeAssigneePanel();
        assigneeTrigger.focus();
      }
    });
    // Initialize label state
    updateAssigneeLabel();

    addTaskBtn.addEventListener('click', () => {
      tfEditId.value = '';
      tfTitle.value = '';
      setSelectedMembers([]);
      closeAssigneePanel();
      tfDue.value = '';
      tfStatus.value = 'Pending';
      taskForm.classList.add('open');
      tfTitle.focus();
    });
    document.getElementById('tf-cancel').addEventListener('click', () => {
      taskForm.classList.remove('open');
      closeAssigneePanel();
    });

    function sendTaskEmail(assignee, task, dueDate) {
      if (!assignee || (Array.isArray(assignee) && assignee.length === 0)) return;
      const payloadAssignee = Array.isArray(assignee) ? assignee.join(', ') : assignee;
      fetch('/api/send-email', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ assignee: payloadAssignee, task, dueDate: dueDate || '', assignedBy: 'Ranch Hand Tasks' }) })
      .catch(err => console.error('Email error:', err));
    }

    const tfSaveBtn = document.getElementById('tf-save');
    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = tfTitle.value.trim();
      if (!title) { tfTitle.focus(); return; }
      const editId = tfEditId.value;
      const isNew = !editId;
      const statusMap = { 'Pending': 'pending', 'In Progress': 'in-progress', 'Done': 'done' };
      const assignees = getSelectedMembers();
      const payload = { title, assigned_to: assignees, due_date: tfDue.value, status: statusMap[tfStatus.value] || 'pending' };
      tfSaveBtn.disabled = true;
      tfSaveBtn.textContent = 'Saving…';
      try {
        const url = editId ? `/api/tasks/${editId}` : '/api/tasks';
        const method = editId ? 'PATCH' : 'POST';
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error(`Save failed (${res.status})`);
      } catch (err) {
        console.error('Task save failed:', err);
        alert(`Couldn't save task. ${err && err.message ? err.message : 'Try again.'}`);
        tfSaveBtn.disabled = false;
        tfSaveBtn.textContent = 'Save';
        return;
      }
      tfSaveBtn.disabled = false;
      tfSaveBtn.textContent = 'Save';
      taskForm.classList.remove('open');
      closeAssigneePanel();
      await renderTasks(); renderCalendar();
      if (isNew && assignees.length > 0) sendTaskEmail(assignees, title, tfDue.value);
    });

    window.editTask = function(id) {
      const t = cachedTasks.find(t => t.id === id); if (!t) return;
      const sm = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done' };
      tfEditId.value = t.id;
      tfTitle.value = t.title;
      setSelectedMembers(t.assigned_to || '');
      tfDue.value = t.due_date;
      tfStatus.value = sm[t.status] || 'Pending';
      taskForm.classList.add('open');
      tfTitle.focus();
    };

    window.deleteTask = async function(id) {
      const t = cachedTasks.find(t => t.id === id);
      const label = t ? t.title : 'this task';
      if (!confirm(`Delete "${label}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`Delete failed (${res.status})`);
      } catch (err) {
        console.error('Task delete failed:', err);
        alert(`Couldn't delete task. ${err && err.message ? err.message : 'Try again.'}`);
        return;
      }
      await renderTasks(); renderCalendar();
    };

    // ── Calendar ──
    let calYear, calMonth;
    (function() { const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); })();

    const calGrid = document.getElementById('cal-grid');
    const calTitle = document.getElementById('cal-title');
    const calPopup = document.getElementById('cal-popup');
    const calPopupTitle = document.getElementById('cal-popup-title');
    const calPopupList = document.getElementById('cal-popup-list');

    document.getElementById('cal-prev').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
    document.getElementById('cal-next').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

    function renderCalendar() {
      const tasks = cachedTasks;
      const today = new Date();
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      calTitle.textContent = `${monthNames[calMonth]} ${calYear}`;
      const tasksByDay = {};
      tasks.forEach(t => {
        if (!t.due_date) return;
        const d = new Date(t.due_date + 'T00:00:00');
        if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
          const day = d.getDate();
          if (!tasksByDay[day]) tasksByDay[day] = [];
          tasksByDay[day].push(t);
        }
      });
      let html = '';
      ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => { html += `<div class="cal-day-label" role="columnheader">${d}</div>`; });
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty" aria-hidden="true"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
        const hasTasks = tasksByDay[d];
        const hasOverdue = hasTasks && hasTasks.some(t => isOverdue(t));
        const cls = ['cal-day']; if (isToday) cls.push('today'); if (hasOverdue) cls.push('has-overdue');
        const dateLabel = new Date(calYear, calMonth, d).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        const taskCount = hasTasks ? hasTasks.length : 0;
        const aria = `${dateLabel}${taskCount ? `, ${taskCount} task${taskCount === 1 ? '' : 's'}${hasOverdue ? ', overdue' : ''}` : ''}`;
        html += `<button type="button" class="${cls.join(' ')}" data-day="${d}" aria-label="${aria}"${isToday ? ' aria-current="date"' : ''}>${d}${hasTasks ? '<div class="cal-dot" aria-hidden="true"></div>' : ''}</button>`;
      }
      calGrid.innerHTML = html;
      calPopup.classList.remove('open');
      calGrid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
        el.addEventListener('click', () => {
          const day = parseInt(el.dataset.day);
          const dayTasks = tasksByDay[day];
          if (!dayTasks || dayTasks.length === 0) { calPopup.classList.remove('open'); return; }
          calPopupTitle.textContent = new Date(calYear, calMonth, day).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
          const sd = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done' };
          calPopupList.innerHTML = dayTasks.map(t =>
            `<li><strong>${escapeHtml(t.title)}</strong> — ${escapeHtml(t.assigned_to || 'Unassigned')} <span class="status-badge ${t.status === 'in-progress' ? 'in-progress' : t.status === 'done' ? 'done' : 'pending'}">${sd[t.status] || t.status}</span></li>`
          ).join('');
          calPopup.classList.add('open');
        });
      });
    }
  </script>
</body>
</html>
