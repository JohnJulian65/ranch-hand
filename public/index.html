<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranch Hand — Capitol Cowboys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Type: display for signature moments, body for everything else */
      --font-display: "Libre Caslon Display", "Iowan Old Style", Georgia, Cambria, serif;
      --font-body: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", monospace;

      /* 5-step type scale (1.143–1.333 ratio) */
      --fs-xs: 0.75rem;     /* 12px — badges, micro labels */
      --fs-sm: 0.875rem;    /* 14px — meta, buttons, tabs */
      --fs-base: 1rem;      /* 16px — body */
      --fs-md: 1.125rem;    /* 18px — emphasis */
      --fs-lg: 1.5rem;      /* 24px — app header */

      /* Weights */
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      /* Color — OKLCH, neutrals tinted toward saddle-gold hue (75°) */
      /* Light surfaces */
      --c-surface:      oklch(0.99 0.005 75);   /* primary bg (was #fff) */
      --c-surface-2:    oklch(0.97 0.008 75);   /* raised / recessed (was #f5f5f5, #f1f1f1) */
      --c-surface-3:    oklch(0.955 0.01 75);   /* form inset (was #f9f9f9) */
      --c-line:         oklch(0.92 0.006 75);   /* default border (was #e5e5e5, #eee) */
      --c-line-strong:  oklch(0.86 0.008 75);   /* input border (was #ddd) */

      /* Ink (text on light) */
      --c-ink:          oklch(0.22 0.008 75);   /* primary body (was #1a1a1a, #2C2C2C text) */
      --c-ink-2:        oklch(0.42 0.008 75);   /* secondary (was #555, #666) */
      --c-ink-3:        oklch(0.50 0.008 75);   /* tertiary / meta (was #777, #888) */
      --c-ink-4:        oklch(0.72 0.008 75);   /* subtle (was #999, #ccc) */

      /* Dark surface (header, tabs, mic) — warm charcoal */
      --c-dark:         oklch(0.25 0.008 75);   /* was #2C2C2C */
      --c-dark-2:       oklch(0.32 0.008 75);   /* hover (was #3a3a3a, #444) */
      --c-on-dark:      oklch(0.98 0.005 75);   /* primary text on dark (was #fff, #f1f1f1) */
      --c-on-dark-2:    oklch(0.70 0.006 75);   /* secondary (was #aaa, #999) */

      /* Brand — saddle gold */
      --c-gold:         oklch(0.76 0.11 75);    /* primary (was #C9A84C) */
      --c-gold-hover:   oklch(0.70 0.11 70);    /* hover (was #b8943f) */
      --c-gold-deep:    oklch(0.58 0.10 65);    /* darker (was #8a6a29) */
      --c-gold-light:   oklch(0.86 0.11 80);    /* focus ring on dark */

      /* Semantic — grounded in earth/western palette, not Bootstrap */
      --c-danger:       oklch(0.55 0.17 25);    /* barn red (was #c0392b) */
      --c-danger-bg:    oklch(0.96 0.03 25);    /* (was #fff5f5, #fff0f0) */
      --c-danger-text:  oklch(0.40 0.14 25);    /* text on light bg (was #9a2b2b) */
      --c-danger-edge:  oklch(0.88 0.05 25);    /* (was #f0d6d6) */

      --c-success:      oklch(0.58 0.10 155);   /* pasture green */
      --c-success-bg:   oklch(0.94 0.04 155);   /* (was #d4edda, #e8f5e9) */
      --c-success-text: oklch(0.38 0.09 155);   /* (was #155724, #2d6f3f) */

      --c-info:         oklch(0.55 0.12 240);   /* denim blue */
      --c-info-bg:      oklch(0.94 0.03 240);   /* (was #d1ecf1) */
      --c-info-text:    oklch(0.38 0.10 240);   /* (was #0c5460) */

      --c-pending-bg:   oklch(0.95 0.05 85);    /* parchment (was #fef3cd) */
      --c-pending-text: oklch(0.40 0.09 70);    /* brass (was #856404) */

      /* Focus — overridable per surface.
         Default uses gold-deep so the ring passes 3:1 against light surfaces;
         dark surfaces override to gold-light below. */
      --c-focus: var(--c-gold-deep);

      /* Motion */
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
      --dur-fast:   140ms;
      --dur-base:   220ms;
      --dur-slow:   420ms;
    }

    /* Dark surfaces want a brighter gold ring for visibility */
    header,
    .tab-nav,
    .cal-header button,
    #mic-btn,
    .retry-btn {
      --c-focus: var(--c-gold-light);
    }

    /* Press feedback on primary buttons — subtle compression, exponential ease */
    #send, .add-task-btn, .btn-save, .btn-cancel,
    .cal-header button, .retry-btn, .conv-new {
      transition:
        background var(--dur-fast) var(--ease-out-quart),
        color var(--dur-fast) var(--ease-out-quart),
        transform var(--dur-fast) var(--ease-out-quart);
    }
    #send:active:not(:disabled),
    .add-task-btn:active,
    .btn-save:active:not(:disabled),
    .btn-cancel:active,
    .cal-header button:active,
    .retry-btn:active,
    .conv-new:active {
      transform: scale(0.97);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-size: var(--fs-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--c-surface);
      color: var(--c-ink);
    }

    /* Visually hidden for accessibility */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Global focus indicator — gold ring works on light and dark surfaces */
    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--c-focus);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    header {
      background: var(--c-dark);
      color: var(--c-on-dark);
      padding: 14px 20px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: rise var(--dur-slow) var(--ease-out-expo) both;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: var(--fs-lg);
      font-weight: 400;
      color: var(--c-gold);
      line-height: 1;
      letter-spacing: 0.005em;
    }
    header p {
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      color: var(--c-on-dark-2);
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Main Tab Nav */
    .tab-nav {
      display: flex;
      flex-shrink: 0;
      background: var(--c-dark);
      border-bottom: 2px solid var(--c-gold);
      animation: rise var(--dur-slow) var(--ease-out-expo) 60ms both;
    }
    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      animation: rise var(--dur-slow) var(--ease-out-expo) 140ms both;
    }

    .tab-nav button {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: var(--c-dark);
      color: var(--c-on-dark-2);
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, background 0.2s;
    }

    .tab-nav button.active { color: var(--c-gold); background: var(--c-dark-2); }
    .tab-nav button:not(.active):hover { color: var(--c-on-dark); }

    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active {
      display: flex;
      animation: rise var(--dur-base) var(--ease-out-quart);
    }

    /* Chat Conversation Tabs */
    .conv-bar {
      display: flex;
      align-items: center;
      background: var(--c-surface-2);
      border-bottom: 1px solid var(--c-line);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .conv-bar::-webkit-scrollbar { height: 4px; }
    .conv-bar::-webkit-scrollbar-thumb { background: var(--c-ink-3); border-radius: 3px; }
    .conv-bar { scrollbar-color: var(--c-ink-3) var(--c-surface-2); }

    .conv-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 10px;
      max-width: 200px;
      border: none;
      background: none;
      color: var(--c-ink-2);
      font-size: var(--fs-xs);
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      flex-shrink: 0;
      transition:
        color var(--dur-fast) var(--ease-out-quart),
        background var(--dur-fast) var(--ease-out-quart),
        border-bottom-color var(--dur-fast) var(--ease-out-quart);
    }

    .conv-tab > span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .conv-tab.active {
      color: var(--c-ink);
      font-weight: var(--fw-semibold);
      border-bottom-color: var(--c-gold);
      background: var(--c-surface);
    }

    .conv-tab:not(.active):hover { color: var(--c-ink); background: var(--c-surface-3); }

    .conv-new {
      padding: 10px 14px;
      border: none;
      background: none;
      color: var(--c-ink);
      font-size: var(--fs-md);
      font-weight: var(--fw-bold);
      cursor: pointer;
      flex-shrink: 0;
      min-width: 44px;
      min-height: 44px;
      line-height: 1;
    }

    .conv-new:hover { color: var(--c-gold-deep); }

    .conv-tab .close-conv {
      background: none;
      border: none;
      color: var(--c-ink-3);
      cursor: pointer;
      padding: 6px;
      line-height: 1;
      font-size: var(--fs-sm);
      border-radius: 4px;
      font-family: inherit;
    }
    .conv-tab .close-conv:hover { color: var(--c-danger); background: rgba(0,0,0,0.05); }

    .clear-memory-btn {
      padding: 6px 12px;
      border: none;
      background: none;
      color: var(--c-danger);
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.03em;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: auto;
      font-family: inherit;
    }
    .clear-memory-btn:hover { color: var(--c-danger-text); }

    /* Chat */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: min(85%, 65ch);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: var(--fs-base);
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg--enter { animation: rise var(--dur-base) var(--ease-out-quart); }
    .system-notice { animation: rise var(--dur-base) var(--ease-out-quart); }
    .typing { animation: fade-in var(--dur-fast) var(--ease-out-quart); }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .msg.assistant { align-self: flex-start; background: var(--c-surface-2); border-bottom-left-radius: 4px; }
    .msg.user { align-self: flex-end; background: var(--c-gold); color: var(--c-ink); border-bottom-right-radius: 4px; }
    .msg p { margin-bottom: 8px; }
    .msg p:last-child { margin-bottom: 0; }
    .msg strong { font-weight: var(--fw-semibold); }
    .msg ul, .msg ol { margin: 4px 0 8px 20px; }
    .msg li { margin-bottom: 2px; }
    .msg code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; font-family: var(--font-mono); }
    .msg pre { background: var(--c-dark); color: var(--c-on-dark); padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: 0.85em; font-family: var(--font-mono); }
    .msg pre code { background: none; padding: 0; color: inherit; font-family: inherit; }

    .typing {
      align-self: flex-start;
      padding: 10px 18px;
      background: var(--c-surface-2);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 7px; height: 7px;
      background: var(--c-ink-3); border-radius: 50%;
      animation: typing-dot 1.25s var(--ease-out-quart) infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    .retry-btn {
      margin-top: 8px;
      background: var(--c-dark); color: var(--c-on-dark); border: none; border-radius: 8px;
      padding: 7px 14px; font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; font-family: inherit;
    }
    .retry-btn:hover { background: var(--c-dark-2); }

    .system-notice {
      align-self: center;
      max-width: 85%;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      letter-spacing: 0.02em;
      color: var(--c-ink-2);
      background: var(--c-surface-2);
      text-align: center;
    }
    .system-notice.success { color: var(--c-success-text); background: var(--c-success-bg); }
    .system-notice.warning { color: var(--c-danger-text); background: var(--c-danger-bg); }

    @keyframes typing-dot {
      0%, 70%, 100% { transform: scale(0.55); opacity: 0.35; }
      35%           { transform: scale(1);    opacity: 1;    }
    }

    /* Shared entrance curves — used by messages, reveals, tab switches */
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes settle {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }

    #input-bar {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--c-line);
      background: var(--c-surface);
    }

    #input-bar textarea {
      flex: 1; resize: none; border: 1px solid var(--c-line-strong); border-radius: 12px;
      padding: 10px 14px; font-size: var(--fs-base); font-family: inherit;
      line-height: 1.4; max-height: 120px; outline: none;
      background: var(--c-surface); color: var(--c-ink);
      transition: border-color var(--dur-fast) var(--ease-out-quart);
    }
    #input-bar textarea:focus { border-color: var(--c-gold); }

    #input-bar button {
      background: var(--c-gold); color: var(--c-ink); border: none; border-radius: 12px;
      padding: 0 18px; font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; flex-shrink: 0;
      font-family: inherit;
    }
    #input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    #input-bar button:hover:not(:disabled) { background: var(--c-gold-hover); }

    #mic-btn {
      background: var(--c-dark); color: var(--c-on-dark); border: none; border-radius: 12px;
      padding: 0 14px; font-size: var(--fs-md); cursor: pointer; flex-shrink: 0;
      display: none; line-height: 1;
    }
    #mic-btn.active { background: var(--c-danger); animation: pulse 1.5s infinite; }
    #mic-btn:hover:not(.active) { background: var(--c-dark-2); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    /* Tasks View */
    #tasks-view { flex: 1; overflow-y: auto; padding: 16px; }
    .summary-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-item {
      background: var(--c-surface-2); padding: 8px 14px; border-radius: 10px;
      font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      font-variant-numeric: tabular-nums;
    }
    .summary-item.overdue { color: var(--c-danger); }

    .add-task-btn {
      background: var(--c-gold); color: var(--c-ink); border: none; border-radius: 10px;
      padding: 10px 20px; font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; margin-bottom: 16px; font-family: inherit;
    }
    .add-task-btn:hover { background: var(--c-gold-hover); }

    .task-form {
      display: none; background: var(--c-surface-3);
      border: 1px solid var(--c-line); border-radius: 12px;
      padding: 16px; margin-bottom: 16px;
    }
    .task-form.open {
      display: block;
      animation: settle var(--dur-base) var(--ease-out-quart);
    }
    .task-form label {
      display: block;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--c-ink-2);
      margin-bottom: 6px; margin-top: 12px;
    }
    .task-form label:first-child { margin-top: 0; }
    .task-form input, .task-form select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--c-line-strong); border-radius: 8px;
      font-size: var(--fs-base); font-family: inherit; outline: none;
      background: var(--c-surface); color: var(--c-ink);
      transition: border-color var(--dur-fast) var(--ease-out-quart);
    }
    .task-form input:focus, .task-form select:focus { border-color: var(--c-gold); }
    .task-form-actions { display: flex; gap: 8px; margin-top: 16px; }
    .task-form-actions button {
      padding: 9px 18px; border: none; border-radius: 8px;
      font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; font-family: inherit;
    }
    .btn-save { background: var(--c-gold); color: var(--c-ink); } .btn-save:hover { background: var(--c-gold-hover); }
    .btn-cancel { background: var(--c-line); color: var(--c-ink); } .btn-cancel:hover { background: var(--c-line-strong); }

    .task-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .tasks-empty {
      color: var(--c-ink-3);
      font-size: var(--fs-sm);
      font-style: italic;
      padding: 24px 4px;
    }
    .task-card {
      background: var(--c-surface); border: 1px solid var(--c-line);
      border-radius: 10px; padding: 14px; position: relative;
      transition:
        transform var(--dur-fast) var(--ease-out-quart),
        border-color var(--dur-fast) var(--ease-out-quart),
        box-shadow var(--dur-fast) var(--ease-out-quart);
    }
    .task-card:hover {
      transform: translateY(-1px);
      border-color: var(--c-line-strong);
      box-shadow: 0 2px 10px oklch(0.22 0.008 75 / 0.06);
    }
    .task-card.overdue { background: var(--c-danger-bg); border-color: var(--c-danger-edge); }
    .task-card.overdue:hover { border-color: oklch(0.75 0.1 25); }
    .task-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .task-title {
      font-weight: var(--fw-semibold);
      font-size: var(--fs-base);
      line-height: 1.35;
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .task-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .task-card-actions button {
      background: none; border: none; cursor: pointer;
      font-size: var(--fs-sm); opacity: 0.55; color: var(--c-ink);
      min-width: 32px; min-height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 6px; font-family: inherit;
    }
    .task-card-actions button:hover { opacity: 1; background: rgba(0,0,0,0.05); }
    .task-meta {
      display: flex; gap: 12px; margin-top: 8px;
      font-size: var(--fs-xs); color: var(--c-ink-2); flex-wrap: wrap; align-items: center;
      font-variant-numeric: tabular-nums;
    }
    .overdue-badge {
      background: var(--c-danger-text); color: var(--c-on-dark);
      font-size: var(--fs-xs); padding: 2px 8px; border-radius: 6px;
      font-weight: var(--fw-bold); letter-spacing: 0.08em;
    }
    .status-badge {
      font-size: var(--fs-xs); padding: 3px 9px; border-radius: 6px;
      font-weight: var(--fw-semibold); letter-spacing: 0.03em;
    }
    .status-badge.pending { background: var(--c-pending-bg); color: var(--c-pending-text); }
    .status-badge.in-progress { background: var(--c-info-bg); color: var(--c-info-text); }
    .status-badge.done { background: var(--c-success-bg); color: var(--c-success-text); }

    /* Calendar */
    .calendar-section { margin-top: 8px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-header h3 {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .cal-header button {
      background: var(--c-dark); color: var(--c-on-dark); border: none; border-radius: 8px;
      padding: 6px 12px; cursor: pointer; font-family: inherit;
      font-size: var(--fs-sm); font-weight: var(--fw-medium);
    }
    .cal-header button:hover { background: var(--c-dark-2); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day-label {
      text-align: center;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-ink-3);
      padding: 6px 0;
    }
    .cal-day {
      text-align: center; padding: 10px 2px 8px;
      font-size: var(--fs-sm);
      font-variant-numeric: tabular-nums;
      border-radius: 8px; cursor: pointer; min-height: 44px; position: relative;
      background: none; border: none; font-family: inherit; color: inherit; width: 100%;
    }
    .cal-day:hover { background: var(--c-surface-2); }
    .cal-day.today {
      font-weight: var(--fw-bold);
      color: var(--c-ink);
      background: oklch(0.93 0.06 75);
    }
    .cal-day.today:hover { background: oklch(0.9 0.08 75); }
    .cal-day.empty { cursor: default; } .cal-day.empty:hover { background: none; }
    .cal-dot { width: 5px; height: 5px; background: var(--c-gold); border-radius: 50%; margin: 2px auto 0; }
    .cal-day.has-overdue .cal-dot { background: var(--c-danger); }
    .cal-popup { display: none; background: var(--c-surface-3); border: 1px solid var(--c-line); border-radius: 10px; padding: 14px; margin-top: 8px; margin-bottom: 8px; }
    .cal-popup.open {
      display: block;
      animation: settle var(--dur-base) var(--ease-out-quart);
    }
    .cal-popup h4 {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--c-ink-2);
      margin-bottom: 8px;
    }
    .cal-popup ul { list-style: none; font-size: var(--fs-sm); }
    .cal-popup li { padding: 6px 0; border-bottom: 1px solid var(--c-line); }
    .cal-popup li:last-child { border-bottom: none; }

    /* ── Responsive adaptation ──
       Mobile-first baseline above. On wider viewports, the app
       sits as a centered frame rather than stretching edge-to-edge. */
    @media (min-width: 720px) {
      /* Backdrop color for the app column to float on */
      html { background: var(--c-surface-2); }
      body {
        max-width: 920px;
        margin-inline: auto;
        border-inline: 1px solid var(--c-line);
      }
      /* More generous internal padding when we have the room */
      #chat { padding: 20px 24px; }
      #tasks-view { padding: 24px; }
      #input-bar { padding: 14px 24px; }
      header { padding: 18px 24px; }
      .conv-bar { padding-inline: 12px; }
    }

    @media (min-width: 1024px) {
      body { max-width: 960px; }
      /* Two-column task summary + wider form feel appropriate here */
      .summary-bar { gap: 16px; }
      #tasks-view { padding: 28px 32px; }
      #chat { padding: 24px 32px; }
      #input-bar { padding: 16px 32px; }
      header { padding: 20px 32px; }
      .task-cards { gap: 12px; }
      /* On the widest viewports, let calendar breathe below the list */
      .calendar-section { margin-top: 24px; }
    }

    /* Landscape phones & narrow tablets: fewer rows of chrome stealing
       vertical space. Trim header/tab padding when the viewport is short. */
    @media (max-height: 600px) {
      header { padding: 10px 16px; }
      header h1 { font-size: 1.25rem; }
      header p { display: none; }
      .tab-nav button { padding: 9px 0; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Ranch Hand</h1>
      <p>Capitol Cowboys Operations</p>
    </div>
  </header>

  <nav class="tab-nav" role="tablist" aria-label="Sections">
    <button class="active" role="tab" id="chat-tab-btn" aria-selected="true" aria-controls="chat-tab" tabindex="0" data-tab="chat-tab">Chat</button>
    <button role="tab" id="tasks-tab-btn" aria-selected="false" aria-controls="tasks-tab" tabindex="-1" data-tab="tasks-tab">Tasks</button>
  </nav>

  <main>
    <!-- Chat Tab -->
    <section id="chat-tab" class="tab-content active" role="tabpanel" aria-labelledby="chat-tab-btn" tabindex="0">
      <h2 class="sr-only">Chat</h2>
      <div class="conv-bar" id="conv-bar" role="toolbar" aria-label="Conversations">
        <button class="conv-new" id="conv-new" aria-label="New conversation" title="New conversation">+</button>
        <button class="clear-memory-btn" id="clear-memory-btn" aria-label="Clear conversation memory" title="Clear conversation memory">Clear Memory</button>
      </div>
      <div id="chat" aria-live="polite" aria-atomic="false" aria-relevant="additions" aria-label="Conversation"></div>
      <div id="input-bar">
        <label for="input" class="sr-only">Message</label>
        <textarea id="input" rows="1" placeholder="Type a message..." autocomplete="off" aria-label="Message"></textarea>
        <button id="mic-btn" type="button" aria-label="Start voice input" aria-pressed="false">&#x1F3A4;</button>
        <button id="send" type="button">Send</button>
      </div>
    </section>

    <!-- Tasks Tab -->
    <section id="tasks-tab" class="tab-content" role="tabpanel" aria-labelledby="tasks-tab-btn" tabindex="0" hidden>
      <h2 class="sr-only">Tasks</h2>
      <div id="tasks-view">
        <div class="summary-bar" id="summary-bar" aria-label="Task summary"></div>
        <button class="add-task-btn" id="add-task-btn" type="button">+ Add Task</button>
        <form class="task-form" id="task-form" aria-label="Task editor">
          <label for="tf-title">Task</label>
          <input type="text" id="tf-title" placeholder="What needs to be done?" maxlength="200" required>
          <label for="tf-assignee">Assign To</label>
          <select id="tf-assignee">
            <option value="">Select member</option>
            <option>Grant</option>
            <option>Patrick</option>
            <option>Aaron</option>
            <option>Cesar</option>
            <option>Jon Michael</option>
            <option>Tristan</option>
            <option>Nico</option>
            <option>Ryan</option>
            <option>Julian</option>
          </select>
          <label for="tf-due">Due Date</label>
          <input type="date" id="tf-due">
          <label for="tf-status">Status</label>
          <select id="tf-status">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
          <input type="hidden" id="tf-edit-id" value="">
          <div class="task-form-actions">
            <button class="btn-save" id="tf-save" type="submit">Save</button>
            <button class="btn-cancel" id="tf-cancel" type="button">Cancel</button>
          </div>
        </form>
        <div class="task-cards" id="task-cards" aria-label="Tasks"></div>
        <section class="calendar-section" aria-label="Task calendar">
          <div class="cal-header">
            <button id="cal-prev" type="button" aria-label="Previous month">&larr;</button>
            <h3 id="cal-title" aria-live="polite"></h3>
            <button id="cal-next" type="button" aria-label="Next month">&rarr;</button>
          </div>
          <div class="cal-grid" id="cal-grid" role="grid"></div>
          <div class="cal-popup" id="cal-popup" role="region" aria-live="polite">
            <h4 id="cal-popup-title"></h4>
            <ul id="cal-popup-list"></ul>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    // ── Tab Navigation (ARIA tablist pattern) ──
    const tabBtns = Array.from(document.querySelectorAll('.tab-nav [role="tab"]'));
    const tabContents = document.querySelectorAll('.tab-content');

    function activateTab(btn, { focus = false } = {}) {
      tabBtns.forEach(b => {
        const isActive = b === btn;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-selected', isActive ? 'true' : 'false');
        b.setAttribute('tabindex', isActive ? '0' : '-1');
      });
      tabContents.forEach(t => {
        const isActive = t.id === btn.dataset.tab;
        t.classList.toggle('active', isActive);
        if (isActive) t.removeAttribute('hidden');
        else t.setAttribute('hidden', '');
      });
      if (focus) btn.focus();
    }

    tabBtns.forEach((btn, i) => {
      btn.addEventListener('click', () => activateTab(btn));
      btn.addEventListener('keydown', (e) => {
        let target;
        if (e.key === 'ArrowRight') target = tabBtns[(i + 1) % tabBtns.length];
        else if (e.key === 'ArrowLeft') target = tabBtns[(i - 1 + tabBtns.length) % tabBtns.length];
        else if (e.key === 'Home') target = tabBtns[0];
        else if (e.key === 'End') target = tabBtns[tabBtns.length - 1];
        else return;
        e.preventDefault();
        activateTab(target, { focus: true });
      });
    });

    // ── Multi-Conversation Chat ──
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const convBar = document.getElementById('conv-bar');
    const convNewBtn = document.getElementById('conv-new');

    let conversations = {};   // { id: { name, messages: [] } }
    let activeConvId = null;
    let sending = false;

    // Persistent session ID for conversation memory
    let sessionId = localStorage.getItem('rh_session_id');
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem('rh_session_id', sessionId);
    }

    const GREETING = "Hey \u2014 I'm Ranch Hand. What do you need?";

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

    function loadConversations() {
      try {
        const raw = localStorage.getItem('rh_convos');
        if (raw) {
          const data = JSON.parse(raw);
          conversations = data.conversations || {};
          activeConvId = data.activeId || null;
          // Migrate old single-chat format
          if (Object.keys(conversations).length === 0) {
            const oldMsgs = JSON.parse(localStorage.getItem('rh_messages') || '[]');
            if (oldMsgs.length > 0) {
              const id = genId();
              const firstUser = oldMsgs.find(m => m.role === 'user');
              conversations[id] = { name: firstUser ? firstUser.content.slice(0, 30) : 'Chat', messages: oldMsgs };
              activeConvId = id;
            }
          }
        } else {
          // Try migrating old single-conversation localStorage
          const oldMsgs = JSON.parse(localStorage.getItem('rh_messages') || '[]');
          if (oldMsgs.length > 0) {
            const id = genId();
            const firstUser = oldMsgs.find(m => m.role === 'user');
            conversations[id] = { name: firstUser ? firstUser.content.slice(0, 30) : 'Chat', messages: oldMsgs };
            activeConvId = id;
          }
        }
      } catch {}

      if (Object.keys(conversations).length === 0) {
        createConversation();
      } else if (!activeConvId || !conversations[activeConvId]) {
        activeConvId = Object.keys(conversations)[0];
      }
    }

    function saveConversations() {
      localStorage.setItem('rh_convos', JSON.stringify({ conversations, activeId: activeConvId }));
    }

    function createConversation() {
      const id = genId();
      conversations[id] = { name: 'New Chat', messages: [{ role: 'assistant', content: GREETING }] };
      activeConvId = id;
      saveConversations();
      renderConvTabs();
      chatEl.innerHTML = '';
      appendMessage('assistant', GREETING);
      return id;
    }

    function switchConversation(id) {
      if (!conversations[id]) return;
      activeConvId = id;
      saveConversations();
      renderConvTabs();
      renderChat();
    }

    function closeConversation(id) {
      delete conversations[id];
      if (activeConvId === id) {
        const keys = Object.keys(conversations);
        if (keys.length === 0) {
          createConversation();
          return;
        }
        activeConvId = keys[keys.length - 1];
      }
      saveConversations();
      renderConvTabs();
      renderChat();
    }

    function renderConvTabs() {
      const existing = convBar.querySelectorAll('.conv-tab');
      existing.forEach(el => el.remove());

      const ids = Object.keys(conversations);
      ids.forEach(id => {
        const conv = conversations[id];
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'conv-tab' + (id === activeConvId ? ' active' : '');
        if (id === activeConvId) tab.setAttribute('aria-current', 'true');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = conv.name;
        tab.appendChild(nameSpan);

        if (ids.length > 1) {
          const closeBtn = document.createElement('button');
          closeBtn.type = 'button';
          closeBtn.className = 'close-conv';
          closeBtn.textContent = '\u00d7';
          closeBtn.setAttribute('aria-label', `Close conversation: ${conv.name}`);
          closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeConversation(id); });
          tab.appendChild(closeBtn);
        }

        tab.addEventListener('click', () => switchConversation(id));
        convBar.insertBefore(tab, convNewBtn);
      });
    }

    function renderChat() {
      chatEl.innerHTML = '';
      const conv = conversations[activeConvId];
      if (!conv) return;
      conv.messages.forEach(m => appendMessage(m.role, m.content, { animate: false }));
    }

    function appendMessage(role, content, { animate = true } = {}) {
      const div = document.createElement('div');
      div.className = `msg ${role}` + (animate ? ' msg--enter' : '');
      div.innerHTML = renderMarkdown(content);
      if (animate) {
        div.addEventListener('animationend', () => div.classList.remove('msg--enter'), { once: true });
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing'; div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

    // Auto-name conversation from first user message
    function maybeNameConversation(text) {
      const conv = conversations[activeConvId];
      if (!conv) return;
      const userCount = conv.messages.filter(m => m.role === 'user').length;
      if (userCount === 1) {
        conv.name = text.slice(0, 35) + (text.length > 35 ? '...' : '');
        saveConversations();
        renderConvTabs();
      }
    }

    convNewBtn.addEventListener('click', () => createConversation());

    document.getElementById('clear-memory-btn').addEventListener('click', async () => {
      if (!confirm('Clear all conversation memory? Ranch Hand will no longer remember past conversations.')) return;
      try {
        await fetch(`/api/memory/${sessionId}`, { method: 'DELETE' });
        const notice = document.createElement('div');
        notice.className = 'system-notice warning';
        notice.textContent = 'Memory cleared. Starting fresh.';
        chatEl.appendChild(notice);
        chatEl.scrollTop = chatEl.scrollHeight;
      } catch (err) {
        console.error('Failed to clear memory:', err);
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener('click', send);

    // Speech-to-text
    const micBtn = document.getElementById('mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      micBtn.style.display = 'block';
      let listening = false, recognition = null;
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      function createRecognition() {
        const r = new SpeechRecognition();
        r.lang = 'en-US'; r.interimResults = false; r.continuous = isIOS ? false : true;
        r.addEventListener('result', (e) => {
          let transcript = '';
          for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) transcript += e.results[i][0].transcript; }
          if (transcript) { inputEl.value += (inputEl.value ? ' ' : '') + transcript.trim(); inputEl.dispatchEvent(new Event('input')); inputEl.focus(); }
        });
        r.addEventListener('end', () => { listening = false; micBtn.classList.remove('active'); recognition = null; });
        r.addEventListener('error', () => { listening = false; micBtn.classList.remove('active'); recognition = null; });
        return r;
      }
      function updateMicState(isListening) {
        listening = isListening;
        micBtn.classList.toggle('active', isListening);
        micBtn.setAttribute('aria-pressed', isListening ? 'true' : 'false');
        micBtn.setAttribute('aria-label', isListening ? 'Stop voice input' : 'Start voice input');
      }
      // Re-wire recognition end/error to update aria state
      const origCreate = createRecognition;
      createRecognition = function() {
        const r = origCreate();
        r.addEventListener('end', () => { recognition = null; updateMicState(false); });
        r.addEventListener('error', () => { recognition = null; updateMicState(false); });
        return r;
      };
      micBtn.addEventListener('click', () => {
        if (listening && recognition) { recognition.stop(); }
        else { recognition = createRecognition(); recognition.start(); updateMicState(true); }
      });
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      const conv = conversations[activeConvId];
      if (!conv) return;

      sending = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      conv.messages.push({ role: 'user', content: text });
      saveConversations();
      maybeNameConversation(text);
      appendMessage('user', text);
      showTyping();

      let assistantText = '';
      let assistantDiv = null;
      let failed = false;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conv.messages, session_id: sessionId }),
        });

        if (!res.ok) {
          throw new Error(`Server returned ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') continue;
            try {
              const data = JSON.parse(payload);
              if (data.text) {
                if (!assistantDiv) { hideTyping(); assistantDiv = appendMessage('assistant', ''); }
                assistantText += data.text;
                const displayText = assistantText.replace(/```tasks\s*\n[\s\S]*?```/g, '');
                assistantDiv.innerHTML = renderMarkdown(displayText);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
              if (data.tasksCreated) {
                const count = data.tasksCreated.length;
                const notice = document.createElement('div');
                notice.className = 'system-notice success';
                notice.textContent = `${count} task${count !== 1 ? 's' : ''} created in Tasks.`;
                chatEl.appendChild(notice);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
            } catch {}
          }
        }
      } catch (err) {
        hideTyping();
        failed = true;
        const offline = typeof navigator !== 'undefined' && navigator.onLine === false;
        const msg = offline
          ? "You appear to be offline. Check your connection and try again."
          : `Couldn't reach Ranch Hand. ${err && err.message ? err.message + '. ' : ''}Tap retry below.`;
        const errDiv = appendMessage('assistant', msg);
        errDiv.setAttribute('role', 'alert');
        const retry = document.createElement('button');
        retry.type = 'button';
        retry.textContent = 'Retry';
        retry.className = 'retry-btn';
        retry.addEventListener('click', () => {
          // Pop the failed user message back into input for retry
          const lastUser = conv.messages.filter(m => m.role === 'user').pop();
          if (lastUser) { inputEl.value = lastUser.content; inputEl.dispatchEvent(new Event('input')); inputEl.focus(); }
          errDiv.remove();
        });
        errDiv.appendChild(document.createElement('br'));
        errDiv.appendChild(retry);
        console.error('Chat request failed:', err);
      }

      hideTyping();
      if (assistantText && !failed) {
        const cleanText = assistantText.replace(/```tasks\s*\n[\s\S]*?```/g, '').trim();
        conv.messages.push({ role: 'assistant', content: cleanText });
        saveConversations();

        const assignMatch = assistantText.match(/ASSIGNED TO:\s*(.+)/i);
        if (assignMatch) {
          const assignee = assignMatch[1].trim().split(/[,\n]/)[0].trim();
          const taskMatch = assistantText.match(/TASK:\s*(.+)/i);
          const dueMatch = assistantText.match(/DUE(?:\s*DATE)?:\s*(.+)/i);
          sendTaskEmail(assignee, taskMatch ? taskMatch[1].trim() : 'Task from chat', dueMatch ? dueMatch[1].trim() : '');
        }
      }

      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ── Init ──
    window.addEventListener('DOMContentLoaded', () => {
      loadConversations();
      renderConvTabs();
      renderChat();
      renderTasks();
      renderCalendar();
    });

    function renderMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/((?:^|\n)- .+(?:\n- .+)*)/g, (match) => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      });
      html = html.replace(/((?:^|\n)\d+\. .+(?:\n\d+\. .+)*)/g, (match) => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
        return `<ol>${items}</ol>`;
      });
      html = html.replace(/\n\n+/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      return `<p>${html}</p>`;
    }

    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    // ── Task Tracker ──
    let cachedTasks = [];

    async function fetchTasks() {
      try { const res = await fetch('/api/tasks'); cachedTasks = await res.json(); } catch { cachedTasks = []; }
      return cachedTasks;
    }

    function isOverdue(task) {
      const status = task.status || '';
      if (status.toLowerCase() === 'done' || !task.due_date) return false;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return new Date(task.due_date + 'T00:00:00') < today;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderSummary() {
      const total = cachedTasks.length;
      const done = cachedTasks.filter(t => (t.status || '').toLowerCase() === 'done').length;
      const overdue = cachedTasks.filter(t => isOverdue(t)).length;
      document.getElementById('summary-bar').innerHTML = `
        <div class="summary-item">Total: ${total}</div>
        <div class="summary-item">Done: ${done}</div>
        ${overdue > 0 ? `<div class="summary-item overdue">Overdue: ${overdue}</div>` : ''}
      `;
    }

    function renderTaskCards() {
      const container = document.getElementById('task-cards');
      if (cachedTasks.length === 0) { container.innerHTML = '<p class="tasks-empty">No tasks yet. Add one above.</p>'; return; }
      const statusMap = { 'pending': 0, 'in-progress': 1, 'done': 2 };
      const sorted = [...cachedTasks].sort((a, b) => (statusMap[a.status] || 0) - (statusMap[b.status] || 0));
      container.innerHTML = sorted.map(t => {
        const overdue = isOverdue(t);
        const s = (t.status || 'pending').toLowerCase();
        const badgeClass = s === 'in-progress' ? 'in-progress' : s === 'done' ? 'done' : 'pending';
        const displayStatus = s === 'in-progress' ? 'In Progress' : s === 'done' ? 'Done' : 'Pending';
        const safeTitle = escapeHtml(t.title);
        return `<article class="task-card${overdue ? ' overdue' : ''}" aria-label="${safeTitle}, ${displayStatus}${overdue ? ', overdue' : ''}">
          <div class="task-card-header">
            <div class="task-title">${safeTitle}</div>
            <div class="task-card-actions">
              <button type="button" onclick="editTask(${t.id})" aria-label="Edit task: ${safeTitle}" title="Edit">&#9998;</button>
              <button type="button" onclick="deleteTask(${t.id})" aria-label="Delete task: ${safeTitle}" title="Delete">&#10005;</button>
            </div>
          </div>
          <div class="task-meta">
            <span>${escapeHtml(t.assigned_to || 'Unassigned')}</span>
            <span>${t.due_date ? formatDate(t.due_date) : 'No due date'}</span>
            <span class="status-badge ${badgeClass}">${displayStatus}</span>
            ${overdue ? '<span class="overdue-badge" aria-hidden="true">OVERDUE</span>' : ''}
          </div>
        </article>`;
      }).join('');
    }

    async function renderTasks() { await fetchTasks(); renderSummary(); renderTaskCards(); }

    // Form
    const addTaskBtn = document.getElementById('add-task-btn');
    const taskForm = document.getElementById('task-form');
    const tfTitle = document.getElementById('tf-title');
    const tfAssignee = document.getElementById('tf-assignee');
    const tfDue = document.getElementById('tf-due');
    const tfStatus = document.getElementById('tf-status');
    const tfEditId = document.getElementById('tf-edit-id');

    addTaskBtn.addEventListener('click', () => { tfEditId.value = ''; tfTitle.value = ''; tfAssignee.value = ''; tfDue.value = ''; tfStatus.value = 'Pending'; taskForm.classList.add('open'); tfTitle.focus(); });
    document.getElementById('tf-cancel').addEventListener('click', () => taskForm.classList.remove('open'));

    function sendTaskEmail(assignee, task, dueDate) {
      if (!assignee) return;
      fetch('/api/send-email', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ assignee, task, dueDate: dueDate || '', assignedBy: 'Ranch Hand Tasks' }) })
      .catch(err => console.error('Email error:', err));
    }

    const tfSaveBtn = document.getElementById('tf-save');
    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = tfTitle.value.trim();
      if (!title) { tfTitle.focus(); return; }
      const editId = tfEditId.value;
      const isNew = !editId;
      const statusMap = { 'Pending': 'pending', 'In Progress': 'in-progress', 'Done': 'done' };
      const payload = { title, assigned_to: tfAssignee.value, due_date: tfDue.value, status: statusMap[tfStatus.value] || 'pending' };
      tfSaveBtn.disabled = true;
      tfSaveBtn.textContent = 'Saving…';
      try {
        const url = editId ? `/api/tasks/${editId}` : '/api/tasks';
        const method = editId ? 'PATCH' : 'POST';
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error(`Save failed (${res.status})`);
      } catch (err) {
        console.error('Task save failed:', err);
        alert(`Couldn't save task. ${err && err.message ? err.message : 'Try again.'}`);
        tfSaveBtn.disabled = false;
        tfSaveBtn.textContent = 'Save';
        return;
      }
      tfSaveBtn.disabled = false;
      tfSaveBtn.textContent = 'Save';
      taskForm.classList.remove('open');
      await renderTasks(); renderCalendar();
      if (isNew && tfAssignee.value) sendTaskEmail(tfAssignee.value, title, tfDue.value);
    });

    window.editTask = function(id) {
      const t = cachedTasks.find(t => t.id === id); if (!t) return;
      const sm = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done' };
      tfEditId.value = t.id; tfTitle.value = t.title; tfAssignee.value = t.assigned_to; tfDue.value = t.due_date; tfStatus.value = sm[t.status] || 'Pending';
      taskForm.classList.add('open'); tfTitle.focus();
    };

    window.deleteTask = async function(id) {
      const t = cachedTasks.find(t => t.id === id);
      const label = t ? t.title : 'this task';
      if (!confirm(`Delete "${label}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`Delete failed (${res.status})`);
      } catch (err) {
        console.error('Task delete failed:', err);
        alert(`Couldn't delete task. ${err && err.message ? err.message : 'Try again.'}`);
        return;
      }
      await renderTasks(); renderCalendar();
    };

    // ── Calendar ──
    let calYear, calMonth;
    (function() { const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); })();

    const calGrid = document.getElementById('cal-grid');
    const calTitle = document.getElementById('cal-title');
    const calPopup = document.getElementById('cal-popup');
    const calPopupTitle = document.getElementById('cal-popup-title');
    const calPopupList = document.getElementById('cal-popup-list');

    document.getElementById('cal-prev').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
    document.getElementById('cal-next').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

    function renderCalendar() {
      const tasks = cachedTasks;
      const today = new Date();
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      calTitle.textContent = `${monthNames[calMonth]} ${calYear}`;
      const tasksByDay = {};
      tasks.forEach(t => {
        if (!t.due_date) return;
        const d = new Date(t.due_date + 'T00:00:00');
        if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
          const day = d.getDate();
          if (!tasksByDay[day]) tasksByDay[day] = [];
          tasksByDay[day].push(t);
        }
      });
      let html = '';
      ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => { html += `<div class="cal-day-label" role="columnheader">${d}</div>`; });
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty" aria-hidden="true"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
        const hasTasks = tasksByDay[d];
        const hasOverdue = hasTasks && hasTasks.some(t => isOverdue(t));
        const cls = ['cal-day']; if (isToday) cls.push('today'); if (hasOverdue) cls.push('has-overdue');
        const dateLabel = new Date(calYear, calMonth, d).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        const taskCount = hasTasks ? hasTasks.length : 0;
        const aria = `${dateLabel}${taskCount ? `, ${taskCount} task${taskCount === 1 ? '' : 's'}${hasOverdue ? ', overdue' : ''}` : ''}`;
        html += `<button type="button" class="${cls.join(' ')}" data-day="${d}" aria-label="${aria}"${isToday ? ' aria-current="date"' : ''}>${d}${hasTasks ? '<div class="cal-dot" aria-hidden="true"></div>' : ''}</button>`;
      }
      calGrid.innerHTML = html;
      calPopup.classList.remove('open');
      calGrid.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
        el.addEventListener('click', () => {
          const day = parseInt(el.dataset.day);
          const dayTasks = tasksByDay[day];
          if (!dayTasks || dayTasks.length === 0) { calPopup.classList.remove('open'); return; }
          calPopupTitle.textContent = new Date(calYear, calMonth, day).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
          const sd = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done' };
          calPopupList.innerHTML = dayTasks.map(t =>
            `<li><strong>${escapeHtml(t.title)}</strong> — ${escapeHtml(t.assigned_to || 'Unassigned')} <span class="status-badge ${t.status === 'in-progress' ? 'in-progress' : t.status === 'done' ? 'done' : 'pending'}">${sd[t.status] || t.status}</span></li>`
          ).join('');
          calPopup.classList.add('open');
        });
      });
    }
  </script>
</body>
</html>
