<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranch Hand — Capitol Cowboys</title>
  <meta name="description" content="Capitol Cowboys Operations">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1815">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ranch Hand">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Type: display for signature moments, body for everything else */
      --font-display: "Libre Caslon Display", "Iowan Old Style", Georgia, Cambria, serif;
      --font-body: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", monospace;

      /* 5-step type scale (1.143–1.333 ratio) */
      --fs-xs: 0.75rem;     /* 12px — badges, micro labels */
      --fs-sm: 0.875rem;    /* 14px — meta, buttons, tabs */
      --fs-base: 1rem;      /* 16px — body */
      --fs-md: 1.125rem;    /* 18px — emphasis */
      --fs-lg: 1.5rem;      /* 24px — app header */

      /* Weights */
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;

      /* Color — OKLCH, neutrals tinted toward saddle-gold hue (75°) */
      /* Light surfaces */
      --c-surface:      oklch(0.99 0.005 75);   /* primary bg (was #fff) */
      --c-surface-2:    oklch(0.97 0.008 75);   /* raised / recessed (was #f5f5f5, #f1f1f1) */
      --c-surface-3:    oklch(0.955 0.01 75);   /* form inset (was #f9f9f9) */
      --c-line:         oklch(0.92 0.006 75);   /* default border (was #e5e5e5, #eee) */
      --c-line-strong:  oklch(0.86 0.008 75);   /* input border (was #ddd) */

      /* Ink (text on light) */
      --c-ink:          oklch(0.22 0.008 75);   /* primary body (was #1a1a1a, #2C2C2C text) */
      --c-ink-2:        oklch(0.42 0.008 75);   /* secondary (was #555, #666) */
      --c-ink-3:        oklch(0.50 0.008 75);   /* tertiary / meta (was #777, #888) */
      --c-ink-4:        oklch(0.72 0.008 75);   /* subtle (was #999, #ccc) */

      /* Dark surface (header, tabs, mic) — warm charcoal */
      --c-dark:         oklch(0.25 0.008 75);   /* was #2C2C2C */
      --c-dark-2:       oklch(0.32 0.008 75);   /* hover (was #3a3a3a, #444) */
      --c-on-dark:      oklch(0.98 0.005 75);   /* primary text on dark (was #fff, #f1f1f1) */
      --c-on-dark-2:    oklch(0.70 0.006 75);   /* secondary (was #aaa, #999) */

      /* Brand — saddle gold */
      --c-gold:         oklch(0.76 0.11 75);    /* primary (was #C9A84C) */
      --c-gold-hover:   oklch(0.70 0.11 70);    /* hover (was #b8943f) */
      --c-gold-deep:    oklch(0.58 0.10 65);    /* darker (was #8a6a29) */
      --c-gold-light:   oklch(0.86 0.11 80);    /* focus ring on dark */

      /* Semantic — grounded in earth/western palette, not Bootstrap */
      --c-danger:       oklch(0.55 0.17 25);    /* barn red (was #c0392b) */
      --c-danger-bg:    oklch(0.96 0.03 25);    /* (was #fff5f5, #fff0f0) */
      --c-danger-text:  oklch(0.40 0.14 25);    /* text on light bg (was #9a2b2b) */
      --c-danger-edge:  oklch(0.88 0.05 25);    /* (was #f0d6d6) */

      --c-success:      oklch(0.58 0.10 155);   /* pasture green */
      --c-success-bg:   oklch(0.94 0.04 155);   /* (was #d4edda, #e8f5e9) */
      --c-success-text: oklch(0.38 0.09 155);   /* (was #155724, #2d6f3f) */

      --c-info:         oklch(0.55 0.12 240);   /* denim blue */
      --c-info-bg:      oklch(0.94 0.03 240);   /* (was #d1ecf1) */
      --c-info-text:    oklch(0.38 0.10 240);   /* (was #0c5460) */

      --c-pending-bg:   oklch(0.95 0.05 85);    /* parchment (was #fef3cd) */
      --c-pending-text: oklch(0.40 0.09 70);    /* brass (was #856404) */

      /* Focus — overridable per surface.
         Default uses gold-deep so the ring passes 3:1 against light surfaces;
         dark surfaces override to gold-light below. */
      --c-focus: var(--c-gold-deep);

      /* Motion */
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
      --dur-fast:   140ms;
      --dur-base:   220ms;
      --dur-slow:   420ms;
    }

    /* Dark surfaces want a brighter gold ring for visibility */
    header,
    .tab-nav,
    .cal-header button,
    #mic-btn,
    .retry-btn {
      --c-focus: var(--c-gold-light);
    }

    /* Press feedback on primary buttons — subtle compression, exponential ease */
    #send, .add-task-btn, .btn-save, .btn-cancel,
    .cal-header button, .retry-btn, .conv-new {
      transition:
        background var(--dur-fast) var(--ease-out-quart),
        color var(--dur-fast) var(--ease-out-quart),
        transform var(--dur-fast) var(--ease-out-quart);
    }
    #send:active:not(:disabled),
    .add-task-btn:active,
    .btn-save:active:not(:disabled),
    .btn-cancel:active,
    .cal-header button:active,
    .retry-btn:active,
    .conv-new:active {
      transform: scale(0.97);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-size: var(--fs-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--c-surface);
      color: var(--c-ink);
    }

    /* Visually hidden for accessibility */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Global focus indicator — gold ring works on light and dark surfaces */
    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--c-focus);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    header {
      background: var(--c-dark);
      color: var(--c-on-dark);
      padding: 14px 20px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: rise var(--dur-slow) var(--ease-out-expo) both;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: var(--fs-lg);
      font-weight: 400;
      color: var(--c-gold);
      line-height: 1;
      letter-spacing: 0.005em;
    }
    header p {
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      color: var(--c-on-dark-2);
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Main Tab Nav */
    .tab-nav {
      display: flex;
      flex-shrink: 0;
      background: var(--c-dark);
      border-bottom: 1px solid oklch(0.22 0.008 75 / 0.6);
      position: relative;
      animation: rise var(--dur-slow) var(--ease-out-expo) 60ms both;
    }
    .tab-indicator {
      position: absolute;
      bottom: -1px;
      left: 0;
      height: 2px;
      width: 0;
      background: var(--c-gold);
      border-radius: 2px;
      transition:
        transform var(--dur-base) var(--ease-out-quint),
        width var(--dur-base) var(--ease-out-quint);
      pointer-events: none;
      will-change: transform, width;
    }
    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      animation: rise var(--dur-slow) var(--ease-out-expo) 140ms both;
    }

    .tab-nav button {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: var(--c-dark);
      color: var(--c-on-dark-2);
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, background 0.2s;
    }

    .tab-nav button.active { color: var(--c-gold); background: var(--c-dark-2); }
    .tab-nav button:not(.active):hover { color: var(--c-on-dark); }

    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active {
      display: flex;
      animation: tab-fade-in var(--dur-base) var(--ease-out-quint);
    }
    @keyframes tab-fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    /* Staggered entry for cards — up to 10 siblings cascade in 50ms apart */
    .stagger-in > * {
      animation: rise var(--dur-base) var(--ease-out-quart) both;
    }
    .stagger-in > *:nth-child(1)  { animation-delay:  0ms; }
    .stagger-in > *:nth-child(2)  { animation-delay: 50ms; }
    .stagger-in > *:nth-child(3)  { animation-delay: 100ms; }
    .stagger-in > *:nth-child(4)  { animation-delay: 150ms; }
    .stagger-in > *:nth-child(5)  { animation-delay: 200ms; }
    .stagger-in > *:nth-child(6)  { animation-delay: 250ms; }
    .stagger-in > *:nth-child(7)  { animation-delay: 300ms; }
    .stagger-in > *:nth-child(8)  { animation-delay: 350ms; }
    .stagger-in > *:nth-child(9)  { animation-delay: 400ms; }
    .stagger-in > *:nth-child(n+10) { animation-delay: 450ms; }

    /* Chat Conversation Tabs */
    .conv-bar {
      display: flex;
      align-items: center;
      background: var(--c-surface-2);
      border-bottom: 1px solid var(--c-line);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .conv-bar::-webkit-scrollbar { height: 4px; }
    .conv-bar::-webkit-scrollbar-thumb { background: var(--c-ink-3); border-radius: 3px; }
    .conv-bar { scrollbar-color: var(--c-ink-3) var(--c-surface-2); }

    .conv-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 10px;
      max-width: 200px;
      border: none;
      background: none;
      color: var(--c-ink-2);
      font-size: var(--fs-xs);
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      flex-shrink: 0;
      transition:
        color var(--dur-fast) var(--ease-out-quart),
        background var(--dur-fast) var(--ease-out-quart),
        border-bottom-color var(--dur-fast) var(--ease-out-quart);
    }

    .conv-tab > span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .conv-tab.active {
      color: var(--c-ink);
      font-weight: var(--fw-semibold);
      border-bottom-color: var(--c-gold);
      background: var(--c-surface);
    }

    .conv-tab:not(.active):hover { color: var(--c-ink); background: var(--c-surface-3); }

    .conv-new {
      padding: 10px 14px;
      border: none;
      background: none;
      color: var(--c-ink);
      font-size: var(--fs-md);
      font-weight: var(--fw-bold);
      cursor: pointer;
      flex-shrink: 0;
      min-width: 44px;
      min-height: 44px;
      line-height: 1;
    }

    .conv-new:hover { color: var(--c-gold-deep); }

    .conv-tab .close-conv {
      background: none;
      border: none;
      color: var(--c-ink-3);
      cursor: pointer;
      padding: 6px;
      line-height: 1;
      font-size: var(--fs-sm);
      border-radius: 4px;
      font-family: inherit;
    }
    .conv-tab .close-conv:hover { color: var(--c-danger); background: rgba(0,0,0,0.05); }

    .clear-memory-btn {
      padding: 6px 12px;
      border: none;
      background: none;
      color: var(--c-danger);
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.03em;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: auto;
      font-family: inherit;
    }
    .clear-memory-btn:hover { color: var(--c-danger-text); }

    /* Chat */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: min(85%, 65ch);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: var(--fs-base);
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg--enter { animation: rise var(--dur-base) var(--ease-out-quart); }
    .system-notice { animation: rise var(--dur-base) var(--ease-out-quart); }
    .typing { animation: fade-in var(--dur-fast) var(--ease-out-quart); }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .msg.assistant { align-self: flex-start; background: var(--c-surface-2); border-bottom-left-radius: 4px; }
    .msg.user { align-self: flex-end; background: var(--c-gold); color: var(--c-ink); border-bottom-right-radius: 4px; }
    .msg p { margin-bottom: 8px; }
    .msg p:last-child { margin-bottom: 0; }
    .msg strong { font-weight: var(--fw-semibold); }
    .msg ul, .msg ol { margin: 4px 0 8px 20px; }
    .msg li { margin-bottom: 2px; }
    .msg code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; font-family: var(--font-mono); }
    .msg pre { background: var(--c-dark); color: var(--c-on-dark); padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: 0.85em; font-family: var(--font-mono); }
    .msg pre code { background: none; padding: 0; color: inherit; font-family: inherit; }
    .msg h1, .msg h2, .msg h3 {
      font-family: var(--font-display);
      font-weight: 400;
      letter-spacing: 0.005em;
      line-height: 1.2;
      margin: 10px 0 6px;
    }
    .msg h1 { font-size: 1.35em; color: var(--c-gold-deep); }
    .msg h2 { font-size: 1.2em; color: var(--c-ink); }
    .msg h3 { font-size: 1.05em; color: var(--c-ink); }
    .msg h1:first-child, .msg h2:first-child, .msg h3:first-child { margin-top: 0; }
    .msg blockquote {
      border-left: 3px solid var(--c-gold);
      background: oklch(0.98 0.015 75);
      padding: 6px 12px;
      margin: 6px 0;
      border-radius: 0 6px 6px 0;
      color: var(--c-ink-2);
      font-style: italic;
    }
    .msg a {
      color: var(--c-gold-deep);
      text-decoration: underline;
      text-decoration-color: var(--c-gold);
      text-underline-offset: 2px;
    }
    .msg a:hover { color: var(--c-gold-hover); }
    /* User bubble is on gold — tone down link/heading colors for contrast */
    .msg.user a { color: var(--c-ink); text-decoration-color: var(--c-ink); }
    .msg.user h1 { color: var(--c-ink); }
    .msg.user blockquote { background: oklch(0.80 0.08 75); border-left-color: var(--c-ink); color: var(--c-ink); }

    .typing {
      align-self: flex-start;
      padding: 10px 18px;
      background: var(--c-surface-2);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 8px; height: 8px;
      background: var(--c-gold); border-radius: 50%;
      box-shadow: 0 0 0 0 oklch(0.76 0.11 75 / 0.4);
      animation: typing-dot 1.25s var(--ease-out-quart) infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    .retry-btn {
      margin-top: 8px;
      background: var(--c-dark); color: var(--c-on-dark); border: none; border-radius: 8px;
      padding: 7px 14px; font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; font-family: inherit;
    }
    .retry-btn:hover { background: var(--c-dark-2); }

    .system-notice {
      align-self: center;
      max-width: 85%;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      letter-spacing: 0.02em;
      color: var(--c-ink-2);
      background: var(--c-surface-2);
      text-align: center;
    }
    .system-notice.success { color: var(--c-success-text); background: var(--c-success-bg); }
    .system-notice.warning { color: var(--c-danger-text); background: var(--c-danger-bg); }

    @keyframes typing-dot {
      0%, 70%, 100% { transform: scale(0.55); opacity: 0.35; }
      35%           { transform: scale(1);    opacity: 1;    }
    }

    /* Shared entrance curves — used by messages, reveals, tab switches */
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes settle {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }

    #input-bar {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--c-line);
      background: var(--c-surface);
    }

    #input-bar textarea {
      flex: 1; resize: none; border: 1px solid var(--c-line-strong); border-radius: 12px;
      padding: 10px 14px; font-size: var(--fs-base); font-family: inherit;
      line-height: 1.4; max-height: 120px; outline: none;
      background: var(--c-surface); color: var(--c-ink);
      transition: border-color var(--dur-fast) var(--ease-out-quart);
    }
    #input-bar textarea:focus { border-color: var(--c-gold); }

    #input-bar button {
      background: var(--c-gold); color: var(--c-ink); border: none; border-radius: 12px;
      padding: 0 18px; font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; flex-shrink: 0;
      font-family: inherit;
    }
    #input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    #input-bar button:hover:not(:disabled) { background: var(--c-gold-hover); }

    #mic-btn {
      background: var(--c-dark); color: var(--c-on-dark); border: none; border-radius: 12px;
      padding: 0 14px; font-size: var(--fs-md); cursor: pointer; flex-shrink: 0;
      display: none; line-height: 1;
    }
    #mic-btn.active { background: var(--c-danger); animation: pulse 1.5s infinite; }
    #mic-btn:hover:not(.active) { background: var(--c-dark-2); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    /* Tasks View */
    #tasks-view { flex: 1; overflow-y: auto; padding: 16px; }
    .summary-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-item {
      background: var(--c-surface-2); padding: 8px 14px; border-radius: 10px;
      font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      font-variant-numeric: tabular-nums;
    }
    .summary-item.overdue { color: var(--c-danger); }

    .add-task-btn {
      background: var(--c-gold); color: var(--c-ink); border: none; border-radius: 10px;
      padding: 10px 20px; font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; margin-bottom: 16px; font-family: inherit;
      box-shadow: 0 1px 3px oklch(0.22 0.008 75 / 0.08);
    }
    .add-task-btn:hover {
      background: var(--c-gold-hover);
      transform: scale(1.03);
      box-shadow: 0 4px 14px oklch(0.22 0.008 75 / 0.14);
    }

    /* Tasks progress bar — sits above summary row */
    .tasks-progress {
      height: 4px;
      width: 100%;
      background: var(--c-surface-2);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .tasks-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--c-gold), var(--c-gold-hover));
      border-radius: 999px;
      transition: width var(--dur-slow) var(--ease-out-expo);
    }
    .tasks-progress-label {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--c-ink-3);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-variant-numeric: tabular-nums;
    }
    .tasks-progress-label b {
      color: var(--c-ink);
      font-weight: var(--fw-semibold);
    }

    .task-form {
      display: none; background: var(--c-surface-3);
      border: 1px solid var(--c-line); border-radius: 12px;
      padding: 16px; margin-bottom: 16px;
    }
    .task-form.open {
      display: block;
      animation: settle var(--dur-base) var(--ease-out-quart);
    }
    .task-form label {
      display: block;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--c-ink-2);
      margin-bottom: 6px; margin-top: 12px;
    }
    .task-form label:first-child { margin-top: 0; }
    .task-form input, .task-form select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--c-line-strong); border-radius: 8px;
      font-size: var(--fs-base); font-family: inherit; outline: none;
      background: var(--c-surface); color: var(--c-ink);
      transition: border-color var(--dur-fast) var(--ease-out-quart);
    }
    .task-form input:focus, .task-form select:focus { border-color: var(--c-gold); }
    .task-form-actions { display: flex; gap: 8px; margin-top: 16px; }
    .task-form-actions button {
      padding: 9px 18px; border: none; border-radius: 8px;
      font-size: var(--fs-sm); font-weight: var(--fw-semibold);
      letter-spacing: 0.04em;
      cursor: pointer; font-family: inherit;
    }
    .btn-save { background: var(--c-gold); color: var(--c-ink); } .btn-save:hover { background: var(--c-gold-hover); }
    .btn-cancel { background: var(--c-line); color: var(--c-ink); } .btn-cancel:hover { background: var(--c-line-strong); }

    /* Multi-select (assignee picker) */
    .multi-select { position: relative; }
    .multi-trigger {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--c-line-strong);
      border-radius: 8px;
      background: var(--c-surface);
      color: var(--c-ink);
      font-family: inherit;
      font-size: var(--fs-base);
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      transition: border-color var(--dur-fast) var(--ease-out-quart);
    }
    .multi-trigger:hover { border-color: var(--c-gold); }
    .multi-trigger[aria-expanded="true"] { border-color: var(--c-gold); }
    .multi-trigger-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .multi-trigger-label.placeholder { color: var(--c-ink-3); }
    .multi-trigger-caret {
      color: var(--c-ink-3);
      font-size: var(--fs-sm);
      flex-shrink: 0;
      transition: transform var(--dur-fast) var(--ease-out-quart);
    }
    .multi-trigger[aria-expanded="true"] .multi-trigger-caret { transform: rotate(180deg); }

    .multi-panel {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--c-surface);
      border: 1px solid var(--c-line-strong);
      border-radius: 8px;
      box-shadow: 0 6px 20px oklch(0.22 0.008 75 / 0.1);
      z-index: 20;
      padding: 4px;
      max-height: 280px;
      overflow-y: auto;
    }
    .multi-panel.open {
      display: block;
      animation: settle var(--dur-fast) var(--ease-out-quart);
    }

    /* Override .task-form label styles for the checkbox rows */
    .task-form .multi-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin: 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: var(--fs-base);
      font-weight: var(--fw-regular);
      color: var(--c-ink);
      letter-spacing: normal;
      text-transform: none;
      line-height: 1.3;
    }
    .task-form .multi-option:hover { background: var(--c-surface-2); }
    .multi-option input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--c-gold);
      cursor: pointer;
      flex-shrink: 0;
      margin: 0;
    }
    .task-form .multi-option.all-members-option {
      border-bottom: 1px solid var(--c-line);
      border-radius: 6px 6px 0 0;
      margin-bottom: 2px;
      font-weight: var(--fw-semibold);
    }

    .task-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .tasks-empty {
      color: var(--c-ink-3);
      font-size: var(--fs-sm);
      font-style: italic;
      padding: 24px 4px;
    }
    .task-card {
      background: var(--c-surface); border: 1px solid var(--c-line);
      border-left: 3px solid var(--c-line);
      border-radius: 10px; padding: 14px; position: relative;
      cursor: pointer;
      transition:
        transform var(--dur-base) var(--ease-out-quint),
        border-color var(--dur-base) var(--ease-out-quart),
        border-left-color var(--dur-slow) var(--ease-out-quart),
        box-shadow var(--dur-base) var(--ease-out-quart);
    }
    .task-card:hover,
    .task-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--c-line-strong);
      box-shadow: 0 6px 18px oklch(0.22 0.008 75 / 0.10);
    }
    .task-card:active { transform: translateY(-1px); }
    .task-card.overdue { background: var(--c-danger-bg); border-color: var(--c-danger-edge); border-left-color: var(--c-danger); }
    .task-card.overdue:hover { border-color: oklch(0.75 0.1 25); }
    .task-card.status-pending     { border-left-color: var(--c-pending-text); }
    .task-card.status-in-progress { border-left-color: var(--c-info); }
    .task-card.status-done        { border-left-color: var(--c-success); }
    .task-card.status-done .task-title { color: var(--c-ink-3); text-decoration: line-through; text-decoration-color: var(--c-ink-4); text-decoration-thickness: 1px; }

    /* Assignee row with avatar */
    .task-assignee {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--c-gold);
      color: var(--c-ink);
      font-size: 0.7rem;
      font-weight: var(--fw-bold);
      letter-spacing: 0;
      flex-shrink: 0;
      text-transform: uppercase;
      box-shadow: inset 0 -1px 0 oklch(0.60 0.10 70 / 0.35);
    }
    .avatar.avatar-unassigned {
      background: var(--c-surface-2);
      color: var(--c-ink-3);
      font-weight: var(--fw-semibold);
    }
    .avatar.avatar-multi {
      background: var(--c-dark);
      color: var(--c-gold);
    }
    .task-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .task-title {
      font-weight: var(--fw-semibold);
      font-size: var(--fs-base);
      line-height: 1.35;
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .task-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .task-card-actions button {
      background: none; border: none; cursor: pointer;
      font-size: var(--fs-sm); opacity: 0.55; color: var(--c-ink);
      min-width: 32px; min-height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 6px; font-family: inherit;
    }
    .task-card-actions button:hover { opacity: 1; background: rgba(0,0,0,0.05); }
    .task-meta {
      display: flex; gap: 12px; margin-top: 8px;
      font-size: var(--fs-xs); color: var(--c-ink-2); flex-wrap: wrap; align-items: center;
      font-variant-numeric: tabular-nums;
    }
    .overdue-badge {
      background: var(--c-danger-text); color: var(--c-on-dark);
      font-size: var(--fs-xs); padding: 2px 8px; border-radius: 6px;
      font-weight: var(--fw-bold); letter-spacing: 0.08em;
    }
    .status-badge {
      font-size: var(--fs-xs); padding: 3px 9px; border-radius: 6px;
      font-weight: var(--fw-semibold); letter-spacing: 0.03em;
    }
    .status-badge.pending { background: var(--c-pending-bg); color: var(--c-pending-text); }
    .status-badge.in-progress { background: var(--c-info-bg); color: var(--c-info-text); }
    .status-badge.done { background: var(--c-success-bg); color: var(--c-success-text); }

    /* Calendar */
    .calendar-section { margin-top: 8px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-header h3 {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .cal-header button {
      background: var(--c-dark); color: var(--c-on-dark); border: none; border-radius: 8px;
      padding: 6px 12px; cursor: pointer; font-family: inherit;
      font-size: var(--fs-sm); font-weight: var(--fw-medium);
    }
    .cal-header button:hover { background: var(--c-dark-2); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day-label {
      text-align: center;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-ink-3);
      padding: 6px 0;
    }
    .cal-day {
      text-align: center; padding: 10px 2px 8px;
      font-size: var(--fs-sm);
      font-variant-numeric: tabular-nums;
      border-radius: 8px; cursor: pointer; min-height: 44px; position: relative;
      background: none; border: none; font-family: inherit; color: inherit; width: 100%;
    }
    .cal-day:hover { background: var(--c-surface-2); }
    .cal-day.today {
      font-weight: var(--fw-bold);
      color: var(--c-ink);
      background: oklch(0.93 0.06 75);
    }
    .cal-day.today:hover { background: oklch(0.9 0.08 75); }
    .cal-day.empty { cursor: default; } .cal-day.empty:hover { background: none; }
    .cal-dot { width: 5px; height: 5px; background: var(--c-gold); border-radius: 50%; margin: 2px auto 0; }
    .cal-day.has-overdue .cal-dot { background: var(--c-danger); }
    .cal-popup { display: none; background: var(--c-surface-3); border: 1px solid var(--c-line); border-radius: 10px; padding: 14px; margin-top: 8px; margin-bottom: 8px; }
    .cal-popup.open {
      display: block;
      animation: settle var(--dur-base) var(--ease-out-quart);
    }
    .cal-popup h4 {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--c-ink-2);
      margin-bottom: 8px;
    }
    .cal-popup ul { list-style: none; font-size: var(--fs-sm); }
    .cal-popup li { padding: 6px 0; border-bottom: 1px solid var(--c-line); }
    .cal-popup li:last-child { border-bottom: none; }

    /* ── Home Dashboard ── */
    #home-view {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 32px;
    }
    .home-hero {
      margin-bottom: 20px;
      animation: rise var(--dur-slow) var(--ease-out-expo) both;
    }
    .home-hero-greeting {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--c-ink);
      line-height: 1.1;
      letter-spacing: 0.005em;
    }
    .home-hero-greeting .accent { color: var(--c-gold-deep); }
    .home-hero-date {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-ink-3);
      margin-top: 6px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--c-surface);
      border: 1px solid var(--c-line);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition:
        transform var(--dur-base) var(--ease-out-quint),
        border-color var(--dur-base) var(--ease-out-quart),
        box-shadow var(--dur-base) var(--ease-out-quart);
    }
    .stat-card:hover,
    .stat-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--c-line-strong);
      box-shadow: 0 6px 18px oklch(0.22 0.008 75 / 0.10);
    }
    .stat-card:active { transform: translateY(-1px); }
    .stat-card-label {
      font-size: 0.7rem;
      font-weight: var(--fw-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-ink-3);
      line-height: 1.3;
    }
    .stat-card-value {
      font-family: var(--font-display);
      font-size: 2.1rem;
      font-weight: 400;
      line-height: 1;
      color: var(--c-ink);
      font-variant-numeric: tabular-nums;
      margin-top: 6px;
    }
    .stat-card-foot {
      font-size: var(--fs-xs);
      color: var(--c-ink-3);
      margin-top: 4px;
    }
    .stat-card.overdue       { border-left: 4px solid var(--c-danger); }
    .stat-card.overdue .stat-card-value { color: var(--c-danger); }
    .stat-card.overdue .stat-card-label { color: var(--c-danger-text); }
    .stat-card.week          { border-left: 4px solid var(--c-gold); }
    .stat-card.week .stat-card-value    { color: var(--c-gold-deep); }
    .stat-card.done          { border-left: 4px solid var(--c-success); }
    .stat-card.done .stat-card-value    { color: var(--c-success); }
    .stat-card.done .stat-card-label    { color: var(--c-success-text); }

    .home-section-head {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-ink-3);
      margin-bottom: 10px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .activity-feed {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-line);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition:
        transform var(--dur-base) var(--ease-out-quint),
        border-color var(--dur-base) var(--ease-out-quart),
        box-shadow var(--dur-base) var(--ease-out-quart);
    }
    .activity-item:hover,
    .activity-item:focus-visible {
      transform: translateY(-2px);
      border-color: var(--c-line-strong);
      box-shadow: 0 4px 14px oklch(0.22 0.008 75 / 0.08);
    }
    .activity-item:active { transform: translateY(-1px); }
    .activity-pill {
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: var(--fw-bold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .activity-pill.created { background: var(--c-pending-bg); color: var(--c-pending-text); }
    .activity-pill.done    { background: var(--c-success-bg); color: var(--c-success-text); }
    .activity-body {
      flex: 1;
      min-width: 0;
    }
    .activity-title {
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--c-ink);
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .activity-meta {
      font-size: var(--fs-xs);
      color: var(--c-ink-3);
      margin-top: 2px;
    }

    /* ── Empty states ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      color: var(--c-ink-3);
      gap: 14px;
    }
    .empty-state svg {
      width: 72px;
      height: 72px;
      color: var(--c-gold);
      opacity: 0.85;
    }
    .empty-state-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--c-ink);
      line-height: 1.2;
    }
    .empty-state-body {
      font-size: var(--fs-sm);
      color: var(--c-ink-3);
      max-width: 30ch;
      line-height: 1.5;
    }
    .chat-empty-state {
      margin: auto;
      padding: 40px 20px;
    }

    /* ── Responsive adaptation ──
       Mobile-first baseline above. On wider viewports, the app
       sits as a centered frame rather than stretching edge-to-edge. */
    @media (min-width: 720px) {
      /* Backdrop color for the app column to float on */
      html { background: var(--c-surface-2); }
      body {
        max-width: 920px;
        margin-inline: auto;
        border-inline: 1px solid var(--c-line);
      }
      /* More generous internal padding when we have the room */
      #chat { padding: 20px 24px; }
      #tasks-view { padding: 24px; }
      #home-view { padding: 28px 24px 40px; }
      #input-bar { padding: 14px 24px; }
      header { padding: 18px 24px; }
      .conv-bar { padding-inline: 12px; }
      .home-hero-greeting { font-size: 2.2rem; }
      .stat-card-value { font-size: 2.4rem; }
    }

    @media (min-width: 1024px) {
      body { max-width: 960px; }
      /* Two-column task summary + wider form feel appropriate here */
      .summary-bar { gap: 16px; }
      #tasks-view { padding: 28px 32px; }
      #chat { padding: 24px 32px; }
      #input-bar { padding: 16px 32px; }
      header { padding: 20px 32px; }
      .task-cards { gap: 12px; }
      /* On the widest viewports, let calendar breathe below the list */
      .calendar-section { margin-top: 24px; }
    }

    /* ── Login Screen ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--c-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fade-in var(--dur-base) var(--ease-out-quart);
    }
    #login-screen[hidden] { display: none; }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--c-surface);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      animation: rise var(--dur-slow) var(--ease-out-expo);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      color: var(--c-gold-deep);
      line-height: 1;
      letter-spacing: 0.005em;
    }
    .login-subtitle {
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      color: var(--c-ink-3);
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #login-form label {
      display: block;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--c-ink-2);
      margin-bottom: 6px;
      margin-top: 16px;
    }
    #login-form label:first-child { margin-top: 0; }
    #login-form select,
    #login-form input {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--c-line-strong);
      border-radius: 8px;
      font-size: var(--fs-base);
      font-family: inherit;
      background: var(--c-surface);
      color: var(--c-ink);
      outline: none;
      transition: border-color var(--dur-fast) var(--ease-out-quart);
    }
    #login-form select:focus,
    #login-form input:focus { border-color: var(--c-gold); }
    #login-form input[type="password"] {
      letter-spacing: 0.4em;
      font-variant-numeric: tabular-nums;
    }
    .login-btn {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      background: var(--c-gold);
      color: var(--c-ink);
      border: none;
      border-radius: 10px;
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition:
        background var(--dur-fast) var(--ease-out-quart),
        transform var(--dur-fast) var(--ease-out-quart);
    }
    .login-btn:hover:not(:disabled) { background: var(--c-gold-hover); }
    .login-btn:active:not(:disabled) { transform: scale(0.97); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      padding: 9px 12px;
      background: var(--c-danger-bg);
      color: var(--c-danger-text);
      border-radius: 8px;
      font-size: var(--fs-sm);
      text-align: center;
    }

    /* ── User controls in header ── */
    header .user-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-name {
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      color: var(--c-on-dark-2);
      letter-spacing: 0.02em;
      margin-right: 4px;
    }
    .logout-btn {
      background: transparent;
      color: var(--c-on-dark-2);
      border: 1px solid var(--c-on-dark-2);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition:
        color var(--dur-fast) var(--ease-out-quart),
        border-color var(--dur-fast) var(--ease-out-quart),
        background var(--dur-fast) var(--ease-out-quart);
    }
    .logout-btn:hover {
      color: var(--c-gold);
      border-color: var(--c-gold);
    }
    .icon-btn {
      background: transparent;
      color: var(--c-on-dark-2);
      border: 1px solid var(--c-on-dark-2);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition:
        color var(--dur-fast) var(--ease-out-quart),
        border-color var(--dur-fast) var(--ease-out-quart),
        transform var(--dur-fast) var(--ease-out-quart);
    }
    .icon-btn svg { width: 16px; height: 16px; display: block; }
    .icon-btn:hover { color: var(--c-gold); border-color: var(--c-gold); }
    .icon-btn:active { transform: scale(0.92) rotate(-12deg); }

    /* ── Set PIN screen (forced first-time change) ── */
    #set-pin-screen {
      position: fixed;
      inset: 0;
      background: var(--c-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fade-in var(--dur-base) var(--ease-out-quart);
    }
    #set-pin-screen[hidden] { display: none; }
    .set-pin-intro {
      font-size: var(--fs-sm);
      color: var(--c-ink-2);
      line-height: 1.5;
      margin-bottom: 8px;
      text-align: center;
    }

    /* ── Modal (Change PIN dialog) ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
      padding: 20px;
      animation: fade-in var(--dur-base) var(--ease-out-quart);
    }
    .modal-overlay[hidden] { display: none; }
    .modal-card {
      position: relative;
      width: 100%;
      max-width: 380px;
      background: var(--c-surface);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      animation: rise var(--dur-slow) var(--ease-out-expo);
    }
    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: transparent;
      border: none;
      color: var(--c-ink-3);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      font-family: inherit;
    }
    .modal-close:hover { color: var(--c-ink); background: var(--c-surface-2); }

    /* Landscape phones & narrow tablets: fewer rows of chrome stealing
       vertical space. Trim header/tab padding when the viewport is short. */
    @media (max-height: 600px) {
      header { padding: 10px 16px; }
      header h1 { font-size: 1.25rem; }
      header p { display: none; }
      .tab-nav button { padding: 9px 0; }
    }
  </style>
</head>
<body>

  <script>
    // ── Tab Navigation (ARIA tablist pattern) ──
    const tabBtns = Array.from(document.querySelectorAll('.tab-nav [role="tab"]'));
    const tabContents = document.querySelectorAll('.tab-content');
    const tabIndicator = document.getElementById('tab-indicator');

    function moveTabIndicator(btn) {
      if (!tabIndicator || !btn) return;
      const nav = btn.parentElement;
      const navRect = nav.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      const offset = btnRect.left - navRect.left;
      tabIndicator.style.width = btnRect.width + 'px';
      tabIndicator.style.transform = `translateX(${offset}px)`;
    }

    function activateTab(btn, { focus = false } = {}) {
      tabBtns.forEach(b => {
        const isActive = b === btn;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-selected', isActive ? 'true' : 'false');
        b.setAttribute('tabindex', isActive ? '0' : '-1');
      });
      tabContents.forEach(t => {
        const isActive = t.id === btn.dataset.tab;
        if (isActive) {
          // Re-trigger the fade-in animation each time this tab activates
          t.classList.remove('active');
          // Force reflow so the animation restarts reliably
          void t.offsetWidth;
          t.classList.add('active');
          t.removeAttribute('hidden');
        } else {
          t.classList.remove('active');
          t.setAttribute('hidden', '');
        }
      });
      moveTabIndicator(btn);
      // Hooks for tab-specific refresh
      if (btn.dataset.tab === 'home-tab') renderHome();
      if (focus) btn.focus();
    }

    tabBtns.forEach((btn, i) => {
      btn.addEventListener('click', () => activateTab(btn));
      btn.addEventListener('keydown', (e) => {
        let target;
        if (e.key === 'ArrowRight') target = tabBtns[(i + 1) % tabBtns.length];
        else if (e.key === 'ArrowLeft') target = tabBtns[(i - 1 + tabBtns.length) % tabBtns.length];
        else if (e.key === 'Home') target = tabBtns[0];
        else if (e.key === 'End') target = tabBtns[tabBtns.length - 1];
        else return;
        e.preventDefault();
        activateTab(target, { focus: true });
      });
    });

    // Keep indicator aligned if the viewport resizes (rare but possible on rotate)
    window.addEventListener('resize', () => {
      const active = tabBtns.find(b => b.classList.contains('active'));
      if (active) moveTabIndicator(active);
    });

    // ── Multi-Conversation Chat ──
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const convBar = document.getElementById('conv-bar');
    const convNewBtn = document.getElementById('conv-new');

    let conversations = {};   // { id: { name, messages: [] } }
    let activeConvId = null;
    let sending = false;
    let currentUser = null;   // { name, email }
    let sessionId = null;     // derived from currentUser.name

    // Normalize a member name to a stable slug used for per-user storage keys
    // and server-side conversation memory scoping.
    function userSlug(name) {
      return String(name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }
    function convosKey(name) { return 'rh_convos_' + userSlug(name); }
    function sessionIdFor(name) { return 'user-' + userSlug(name); }

    function loadCurrentUser() {
      try {
        const raw = localStorage.getItem('rh_user');
        if (!raw) return null;
        const user = JSON.parse(raw);
        if (!user || !user.name) return null;
        return user;
      } catch { return null; }
    }

    const GREETING = "Hey \u2014 I'm Ranch Hand. What do you need?";

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

    function loadConversations() {
      conversations = {};
      activeConvId = null;
      if (!currentUser) return;
      try {
        const raw = localStorage.getItem(convosKey(currentUser.name));
        if (raw) {
          const data = JSON.parse(raw);
          conversations = data.conversations || {};
          activeConvId = data.activeId || null;
        }
      } catch {}

      if (Object.keys(conversations).length === 0) {
        createConversation();
      } else if (!activeConvId || !conversations[activeConvId]) {
        activeConvId = Object.keys(conversations)[0];
      }
    }

    function saveConversations() {
      if (!currentUser) return;
      localStorage.setItem(
        convosKey(currentUser.name),
        JSON.stringify({ conversations, activeId: activeConvId })
      );
    }

    function createConversation() {
      const id = genId();
      conversations[id] = { name: 'New Chat', messages: [{ role: 'assistant', content: GREETING }] };
      activeConvId = id;
      saveConversations();
      renderConvTabs();
      renderChat();
      return id;
    }

    function switchConversation(id) {
      if (!conversations[id]) return;
      activeConvId = id;
      saveConversations();
      renderConvTabs();
      renderChat();
    }

    function closeConversation(id) {
      delete conversations[id];
      if (activeConvId === id) {
        const keys = Object.keys(conversations);
        if (keys.length === 0) {
          createConversation();
          return;
        }
        activeConvId = keys[keys.length - 1];
      }
      saveConversations();
      renderConvTabs();
      renderChat();
    }

    function renderConvTabs() {
      const existing = convBar.querySelectorAll('.conv-tab');
      existing.forEach(el => el.remove());

      const ids = Object.keys(conversations);
      ids.forEach(id => {
        const conv = conversations[id];
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'conv-tab' + (id === activeConvId ? ' active' : '');
        if (id === activeConvId) tab.setAttribute('aria-current', 'true');
        const nameSpan = document.createElement('span');
        nameSpan.textContent = conv.name;
        tab.appendChild(nameSpan);

        if (ids.length > 1) {
          const closeBtn = document.createElement('button');
          closeBtn.type = 'button';
          closeBtn.className = 'close-conv';
          closeBtn.textContent = '\u00d7';
          closeBtn.setAttribute('aria-label', `Close conversation: ${conv.name}`);
          closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeConversation(id); });
          tab.appendChild(closeBtn);
        }

        tab.addEventListener('click', () => switchConversation(id));
        convBar.insertBefore(tab, convNewBtn);
      });
    }

    function renderChat() {
      chatEl.innerHTML = '';
      const conv = conversations[activeConvId];
      if (!conv) return;
      // Fresh conversation (only the auto-greeting) gets an illustrated empty state.
      const hasUserMessage = conv.messages.some(m => m.role === 'user');
      if (!hasUserMessage && conv.messages.length <= 1) {
        const empty = document.createElement('div');
        empty.className = 'empty-state chat-empty-state';
        empty.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
          </svg>
          <div class="empty-state-title">Howdy — ready when you are</div>
          <div class="empty-state-body">Ask about tasks, events, members, or paste a meeting transcript to auto-extract action items.</div>
        `;
        chatEl.appendChild(empty);
        return;
      }
      conv.messages.forEach(m => appendMessage(m.role, m.content, { animate: false }));
    }

    function appendMessage(role, content, { animate = true } = {}) {
      // If an empty-state placeholder is showing, clear it before adding the first real message.
      const placeholder = chatEl.querySelector('.chat-empty-state');
      if (placeholder) placeholder.remove();

      const div = document.createElement('div');
      div.className = `msg ${role}` + (animate ? ' msg--enter' : '');
      div.innerHTML = renderMarkdown(content);
      if (animate) {
        div.addEventListener('animationend', () => div.classList.remove('msg--enter'), { once: true });
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing'; div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

    // Auto-name conversation from first user message
    function maybeNameConversation(text) {
      const conv = conversations[activeConvId];
      if (!conv) return;
      const userCount = conv.messages.filter(m => m.role === 'user').length;
      if (userCount === 1) {

    // Speech-to-text
    const micBtn = document.getElementById('mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      micBtn.style.display = 'block';
      let listening = false, recognition = null;
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      function createRecognition() {
        const r = new SpeechRecognition();
        r.lang = 'en-US'; r.interimResults = false; r.continuous = isIOS ? false : true;
        r.addEventListener('result', (e) => {
          let transcript = '';
          for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) transcript += e.results[i][0].transcript; }
          if (transcript) { inputEl.value += (inputEl.value ? ' ' : '') + transcript.trim(); inputEl.dispatchEvent(new Event('input')); inputEl.focus(); }
        });
        r.addEventListener('end', () => { listening = false; micBtn.classList.remove('active'); recognition = null; });
        r.addEventListener('error', () => { listening = false; micBtn.classList.remove('active'); recognition = null; });
        return r;
      }
      function updateMicState(isListening) {
        listening = isListening;
        micBtn.classList.toggle('active', isListening);
        micBtn.setAttribute('aria-pressed', isListening ? 'true' : 'false');
        micBtn.setAttribute('aria-label', isListening ? 'Stop voice input' : 'Start voice input');
      }
      // Re-wire recognition end/error to update aria state
      const origCreate = createRecognition;
      createRecognition = function() {
        const r = origCreate();
        r.addEventListener('end', () => { recognition = null; updateMicState(false); });
        r.addEventListener('error', () => { recognition = null; updateMicState(false); });
        return r;
      };
      micBtn.addEventListener('click', () => {
        if (listening && recognition) { recognition.stop(); }
        else { recognition = createRecognition(); recognition.start(); updateMicState(true); }
      });
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      const conv = conversations[activeConvId];
      if (!conv) return;

      sending = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      conv.messages.push({ role: 'user', content: text });
      saveConversations();
      maybeNameConversation(text);
      appendMessage('user', text);
      showTyping();

      let assistantText = '';
      let assistantDiv = null;
      let failed = false;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conv.messages, session_id: sessionId }),
        });

        if (!res.ok) {
          throw new Error(`Server returned ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') continue;
            try {
              const data = JSON.parse(payload);
              if (data.text) {
                if (!assistantDiv) { hideTyping(); assistantDiv = appendMessage('assistant', ''); }
                assistantText += data.text;
                const displayText = assistantText.replace(/```tasks\s*\n[\s\S]*?```/g, '');
                assistantDiv.innerHTML = renderMarkdown(displayText);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
              if (data.tasksCreated) {
                const count = data.tasksCreated.length;
                const notice = document.createElement('div');
                notice.className = 'system-notice success';
                notice.textContent = `${count} task${count !== 1 ? 's' : ''} created in Tasks.`;
                chatEl.appendChild(notice);
                chatEl.scrollTop = chatEl.scrollHeight;
              }
            } catch {}
          }
        }
      } catch (err) {
        hideTyping();
        failed = true;
        const offline = typeof navigator !== 'undefined' && navigator.onLine === false;
        const msg = offline
          ? "You appear to be offline. Check your connection and try again."
          : `Couldn't reach Ranch Hand. ${err && err.message ? err.message + '. ' : ''}Tap retry below.`;
        const errDiv = appendMessage('assistant', msg);
        errDiv.setAttribute('role', 'alert');
        const retry = document.createElement('button');
        retry.type = 'button';
        retry.textContent = 'Retry';
        retry.className = 'retry-btn';
        retry.addEventListener('click', () => {
          // Pop the failed user message back into input for retry
          const lastUser = conv.messages.filter(m => m.role === 'user').pop();
          if (lastUser) { inputEl.value = lastUser.content; inputEl.dispatchEvent(new Event('input')); inputEl.focus(); }
          errDiv.remove();
        });
        errDiv.appendChild(document.createElement('br'));
        errDiv.appendChild(retry);
        console.error('Chat request failed:', err);
      }

      hideTyping();
      if (assistantText && !failed) {
        const cleanText = assistantText.replace(/```tasks\s*\n[\s\S]*?```/g, '').trim();
        conv.messages.push({ role: 'assistant', content: cleanText });
        saveConversations();

        const assignMatch = assistantText.match(/ASSIGNED TO:\s*(.+)/i);
        if (assignMatch) {
          const assignee = assignMatch[1].trim().split('\n')[0].trim();
          const taskMatch = assistantText.match(/TASK:\s*(.+)/i);
          const dueMatch = assistantText.match(/DUE(?:\s*DATE)?:\s*(.+)/i);
          sendTaskEmail(assignee, taskMatch ? taskMatch[1].trim() : 'Task from chat', dueMatch ? dueMatch[1].trim() : '');
        }
      }

      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
