<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranch Hand — Capitol Cowboys</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #fff;
      color: #1a1a1a;
    }

    header {
      background: #2C2C2C;
      color: #fff;
      padding: 14px 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #C9A84C;
      line-height: 1.2;
    }

    header p {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 2px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #f1f1f1;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      align-self: flex-end;
      background: #C9A84C;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg p { margin-bottom: 8px; }
    .msg p:last-child { margin-bottom: 0; }
    .msg strong { font-weight: 600; }
    .msg ul, .msg ol { margin: 4px 0 8px 20px; }
    .msg li { margin-bottom: 2px; }
    .msg code {
      background: rgba(0,0,0,0.07);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.88em;
    }
    .msg pre {
      background: #2C2C2C;
      color: #f1f1f1;
      padding: 10px 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 6px 0;
      font-size: 0.85em;
    }
    .msg pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .typing {
      align-self: flex-start;
      padding: 10px 18px;
      background: #f1f1f1;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-bar {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      background: #fff;
    }

    #input-bar textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      outline: none;
    }

    #input-bar textarea:focus {
      border-color: #C9A84C;
    }

    #input-bar button {
      background: #C9A84C;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    #input-bar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #input-bar button:hover:not(:disabled) {
      background: #b8943f;
    }

    #mic-btn {
      background: #2C2C2C;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: none;
      line-height: 1;
    }

    #mic-btn.active {
      background: #c0392b;
      animation: pulse 1.5s infinite;
    }

    #mic-btn:hover:not(.active) {
      background: #444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ranch Hand</h1>
    <p>Capitol Cowboys Operations</p>
  </header>

  <div id="chat"></div>

  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
    <button id="mic-btn" aria-label="Voice input">&#x1F3A4;</button>
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    let messages = [];
    let sending = false;

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    // Speech-to-text
    const micBtn = document.getElementById('mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      micBtn.style.display = 'block';
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      let listening = false;

      micBtn.addEventListener('click', () => {
        if (listening) {
          recognition.stop();
        } else {
          recognition.start();
        }
      });

      recognition.addEventListener('start', () => {
        listening = true;
        micBtn.classList.add('active');
      });

      recognition.addEventListener('end', () => {
        listening = false;
        micBtn.classList.remove('active');
      });

      recognition.addEventListener('result', (e) => {
        let transcript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            transcript += e.results[i][0].transcript;
          }
        }
        if (transcript) {
          const current = input.value;
          input.value = current + (current ? ' ' : '') + transcript.trim();
          input.dispatchEvent(new Event('input'));
          input.focus();
        }
      });
    }

    // Greeting on load
    window.addEventListener('DOMContentLoaded', () => {
      const greeting = "Hey — I'm Ranch Hand. What do you need?";
      messages.push({ role: 'assistant', content: greeting });
      appendMessage('assistant', greeting);
    });

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = renderMarkdown(content);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sending) return;

      sending = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      showTyping();

      let assistantText = '';
      let assistantDiv = null;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') continue;

            try {
              const data = JSON.parse(payload);
              if (data.text) {
                if (!assistantDiv) {
                  hideTyping();
                  assistantDiv = appendMessage('assistant', '');
                }
                assistantText += data.text;
                assistantDiv.innerHTML = renderMarkdown(assistantText);
                chat.scrollTop = chat.scrollHeight;
              }
            } catch {}
          }
        }
      } catch (err) {
        hideTyping();
        assistantText = 'Something went wrong. Try again.';
        appendMessage('assistant', assistantText);
      }

      hideTyping();
      if (assistantText) {
        messages.push({ role: 'assistant', content: assistantText });
      }

      sending = false;
      sendBtn.disabled = false;
      input.focus();
    }

    // Lightweight markdown renderer
    function renderMarkdown(text) {
      let html = escapeHtml(text);

      // Code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Unordered lists
      html = html.replace(/((?:^|\n)- .+(?:\n- .+)*)/g, (match) => {
        const items = match.trim().split('\n').map(l =>
          `<li>${l.replace(/^- /, '')}</li>`
        ).join('');
        return `<ul>${items}</ul>`;
      });

      // Ordered lists
      html = html.replace(/((?:^|\n)\d+\. .+(?:\n\d+\. .+)*)/g, (match) => {
        const items = match.trim().split('\n').map(l =>
          `<li>${l.replace(/^\d+\. /, '')}</li>`
        ).join('');
        return `<ol>${items}</ol>`;
      });

      // Paragraphs (double newlines)
      html = html.replace(/\n\n+/g, '</p><p>');

      // Line breaks
      html = html.replace(/\n/g, '<br>');

      return `<p>${html}</p>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
